name: Build ESPHome Firmware

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Tests
        run: |
          g++ -o simple_test \
          tests/simple_test_runner.cpp \
          components/ventilation_logic/ventilation_logic.cpp \
          components/ventilation_group/ventilation_state_machine.cpp \
          -Icomponents

      - name: Run Tests
        run: ./simple_test

  build:
    name: "Build ${{ matrix.name }}"
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - yaml: ventosync.yaml
            name: ventosync-full
          - yaml: ventosync_nosensor.yaml
            name: ventosync-nosensor
          - yaml: ventosync_radar_only.yaml
            name: ventosync-radar-only
          - yaml: ventosync_bme680_only.yaml
            name: ventosync-bme680-only
          - yaml: ventosync_NTConly.yaml
            name: ventosync-ntconly

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create dummy secrets for CI compilation
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "dummy"
          wifi_password: "dummydummydummy"
          otapw: "dummy"
          appw: "ventosync"
          webuser: "admin"
          webpw: "admin"
          api_encryption_key: "${{ secrets.API_ENCRYPTION_KEY }}"
          EOF

          # If API_ENCRYPTION_KEY secret is not set, use a dummy value
          if [ -z "${{ secrets.API_ENCRYPTION_KEY }}" ]; then
            sed -i 's/api_encryption_key: ""/api_encryption_key: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="/' secrets.yaml
          fi

      - name: Prepare OTA build config (swap WiFi, API, OTA to secret-free variants)
        run: |
          # 1. Replace WiFi block: remove ssid/password lines (ESP uses NVS-stored creds)
          # We use a more robust sed pattern to ensure valid YAML remains
          sed -i '/^  networks:/,/^  fast_connect:/{/^  fast_connect:/!d;}' packages/base/esp32c6_common.yaml

          # 2. Remove OTA password (allow unauthenticated OTA for CI builds)
          sed -i 's/password: !secret otapw//g' packages/base/esp32c6_common.yaml

          # 3. Remove AP secret password, use fixed value
          sed -i 's/password: !secret appw/password: "ventosync"/g' packages/base/esp32c6_common.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome and compile firmware
        run: |
          pip install wheel esphome==2026.4.5
          esphome compile ${{ matrix.yaml }}

      - name: Locate firmware binary
        id: firmware
        run: |
          # ESPHome builds to .esphome/build/<device-name>/.pioenvs/<device-name>/
          BUILD_DIR=$(find .esphome/build -name "firmware.ota.bin" -type f | head -1 | xargs dirname)
          echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT

          if [ -f "$BUILD_DIR/firmware.ota.bin" ]; then
            cp "$BUILD_DIR/firmware.ota.bin" "${{ matrix.name }}.ota.bin"
            echo "ota_bin=${{ matrix.name }}.ota.bin" >> $GITHUB_OUTPUT
          fi

          if [ -f "$BUILD_DIR/firmware.factory.bin" ]; then
            cp "$BUILD_DIR/firmware.factory.bin" "${{ matrix.name }}.factory.bin"
            echo "factory_bin=${{ matrix.name }}.factory.bin" >> $GITHUB_OUTPUT
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: |
            ${{ matrix.name }}.ota.bin
            ${{ matrix.name }}.factory.bin
          if-no-files-found: warn

  # ---------------------------------------------------------------
  # AUTOMATIC RELEASE
  # Creates a GitHub Release after all builds succeed on master push.
  # Attaches all firmware OTA binaries and per-variant manifest.json
  # files so devices can auto-discover updates.
  # ---------------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Only create releases on master push, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['project_version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: v$VERSION"

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts
          pattern: firmware-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la firmware-artifacts/

      - name: Extract Changelog from CHANGELOG.md
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            # Extrahiere den Text zwischen dem ersten und dem zweiten "## [" Header
            LOG=$(awk '/^## \[/ {count++; if(count==2) exit} count==1 {if(!/^## \[/) print}' CHANGELOG.md | sed -e '/^[[:space:]]*$/d' -e '1!b' -e '/^[[:space:]]*$/d')
            if [ -z "$LOG" ]; then
              LOG="Keine Details in der CHANGELOG.md gefunden."
            fi
          else
            LOG="CHANGELOG.md nicht gefunden."
          fi
          
          # Sicheres Escaping für Multiline-Outputs in GitHub Actions
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
          echo "📝 Changelog aus CHANGELOG.md extrahiert:"
          echo "$LOG"

      - name: Generate per-variant manifest.json files
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          cd firmware-artifacts
          for variant in ventosync-full ventosync-nosensor ventosync-radar-only ventosync-bme680-only; do
            OTA_FILE="${variant}.ota.bin"
            MANIFEST_FILE="manifest-${variant}.json"

            if [ -f "$OTA_FILE" ]; then
              MD5OTA=$(md5sum "$OTA_FILE" | cut -d ' ' -f 1)
              VERSION="${{ steps.version.outputs.version }}"
              TAG="${{ steps.version.outputs.tag }}"

              # Use Python to safely inject values into the JSON template
              export VERSION MD5OTA OTA_FILE TAG
              python3 -c "import json,sys,os; d=json.load(open('../json/manifest_template.json')); d['version']=os.environ['VERSION']; o=d['builds'][0]['ota']; o['md5']=os.environ['MD5OTA']; o['path']=o['path'].replace('FILEOTA',os.environ['OTA_FILE']).replace('FIRMWARE_TAG',os.environ['TAG']); o['release_url']=o['release_url'].replace('FIRMWARE_TAG',os.environ['TAG']); o['summary']=os.environ.get('CHANGELOG','Update verfügbar'); json.dump(d,open(sys.argv[1],'w'),indent=2)" "$MANIFEST_FILE"

              echo "✅ Generated $MANIFEST_FILE (MD5: $MD5OTA)"
              cat "$MANIFEST_FILE"
            else
              echo "⚠️ $OTA_FILE not found, skipping manifest for $variant"
            fi
          done

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Write release notes to a file to avoid bash escaping issues with backticks
          cat > release_notes.md << 'EOF'
          ## VentoSync Firmware v${{ steps.version.outputs.version }}

          Automatisch erstellter Release mit Firmware für alle Hardware-Varianten.

          ### 🔄 Changelog
          ${{ steps.changelog.outputs.changelog }}

          ### Verfügbare Varianten
          | Datei | Beschreibung |
          |-------|-------------|
          | `ventosync-full.ota.bin` | Alle Sensoren (SCD41 + BME680 + LD2450) |
          | `ventosync-nosensor.ota.bin` | Ohne Sensoren (nur Lüftersteuerung) |
          | `ventosync-radar-only.ota.bin` | Nur LD2450 Radar |
          | `ventosync-bme680-only.ota.bin` | Nur BME680 Sensor |
          | `ventosync-ntconly.ota.bin` | Nur NTC Sensoren (Wärmerückgewinnung) |

          ### OTA Update
          Die Geräte prüfen automatisch auf Updates über ihre konfigurierte `manifest-<variant>.json`.
          EOF

          # Check if tag already exists — update existing release
          if gh release view "$TAG" &>/dev/null; then
            echo "⚠️ Release $TAG already exists. Ensuring it is marked as latest..."
            gh release edit "$TAG" --notes-file release_notes.md --latest
          else
            echo "🚀 Creating release $TAG..."
            gh release create "$TAG" \
              --title "VentoSync v$VERSION" \
              --notes-file release_notes.md \
              --latest
          fi

          # Upload all OTA binaries, factory binaries, and manifests
          cd firmware-artifacts
          for f in *.ota.bin *.factory.bin manifest-*.json; do
            if [ -f "$f" ]; then
              echo "📤 Uploading $f..."
              gh release upload --clobber "$TAG" "$f"
            fi
          done

          echo "✅ Release $TAG complete!"
