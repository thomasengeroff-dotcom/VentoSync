name: Build ESPHome Firmware

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Tests
        run: |
          g++ -o simple_test \
          tests/simple_test_runner.cpp \
          components/ventilation_logic/ventilation_logic.cpp \
          components/ventilation_group/ventilation_state_machine.cpp \
          -Icomponents

      - name: Run Tests
        run: ./simple_test

  build:
    name: ESPHome Build
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create dummy secrets.yaml
        run: cp secrets_example.yaml secrets.yaml

      - name: ESPHome Builder
        id: esphome-build
        uses: esphome/build-action@v7.2.0
        with:
          yaml-file: esp_wohnraumlueftung.yaml
          version: "2025.12.7"

      - name: Upload ESPHome Binaries
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ steps.esphome-build.outputs.name }}
          path: ${{ steps.esphome-build.outputs.name }}
