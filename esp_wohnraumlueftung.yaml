substitutions:
  device_name: esptest
  friendly_name: "ESPTest"
  min_fan_threshold: "10"

  # VENTILATION CONFIG - Default Values
  # These are initial values. The actual configuration can be changed
  # via Home Assistant and is stored persistently in flash memory.
  floor_id: "1"
  room_id: "1"
  device_id: "1"
  # Phase A = Starts with INTAKE (Rein). Phase B = Starts with EXHAUST (Raus).
  # Devices on same wall should have same phase.
  is_phase_a: "true"

# ---------------------------------------------------------
# PACKAGES & INCLUDES
# ---------------------------------------------------------
# Include common settings (WiFi, Logger, API) and device-specific configs
packages:
  common: !include esp32c6_common.yaml
  device_config_pkg: !include device_config.yaml

external_components:
  - source:
      type: local
      path: components

esphome:
  includes:
    - automation_helpers.h # Helper functions logic
    - automation_helpers.h # Helper functions logic
  on_boot:
    priority: 600
    then:
      - script.execute: update_leds

# ---------------------------------------------------------
# GLOBAL VARIABLES (State Memory)
# ---------------------------------------------------------
globals:
  # Main system power state
  - id: system_on
    type: bool
    initial_value: "true"

  # Fan intensity level (1-10)
  - id: fan_intensity_level
    type: int
    initial_value: "5" # Start at medium intensity
  # Current operating mode index (0=WRG, 1=Durchlüften, 2=Aus)
  - id: current_mode_index
    type: int
    initial_value: "0"

# ---------------------------------------------------------
# VENTILATION COMPONENT (External)
# ---------------------------------------------------------
ventilation_group:
  id: ventilation_ctrl
  floor_id: ${floor_id}
  room_id: ${room_id}
  device_id: ${device_id}
  is_phase_a: ${is_phase_a}
  main_fan: lueftung_fan
  direction_switch: fan_direction

# ---------------------------------------------------------
# ESP-NOW COMMUNICATION
# ---------------------------------------------------------
# Configures peer-to-peer communication with the Slave/Consumer device
espnow:
  peers:
    # - "98:A3:16:85:96:70" # Target MAC Address (Slave)
    - "FF:FF:FF:FF:FF:FF" # Broadcast for Discovery/Sync
  on_receive:
    then:
      - lambda: |-
          std::vector<uint8_t> packet(data, data + size);
          ((esphome::VentilationController*)id(ventilation_ctrl))->on_packet_received(packet);

# packet_transport:
#   - platform: espnow
#     # Encryption is currently disabled/commented out
#     # encryption: "HubSecret123"
#     peer_address: "98:A3:16:85:96:70"
#     sensors:
#       # Data sent over ESP-NOW to the other device
#       - iaq
#       - temperature

# ---------------------------------------------------------
# I2C BUS CONFIGURATION
# ---------------------------------------------------------
i2c:
  sda: GPIO22 # Pin D4 on XIAO ESP32C6
  scl: GPIO23 # Pin D5 on XIAO ESP32C6
  scan: true
  id: bus_a
  frequency: 400kHz # Fast I2C Mode (400kHz)
  timeout: 50ms # Increased timeout to prevent "software timeout" errors

# ---------------------------------------------------------
# MCP23017 I/O EXPANDER
# ---------------------------------------------------------
mcp23017:
  - id: mcp_hub
    address: 0x20

# ---------------------------------------------------------
# BME680 SENSOR (BSEC2)
# ---------------------------------------------------------
# Configured via I2C at address 0x77
bme68x_bsec2_i2c:
  address: 0x77
  model: bme680
  operating_age: 28d # Time for the sensor to reach stable calibration
  sample_rate: LP # Low Power mode (sampling every 3s)
  supply_voltage: 3.3V
  temperature_offset: 0.0 # Adjusted for room temperature
  state_save_interval: 6h # Save state every 6 hours

# ---------------------------------------------------------
# MCP23017 OUTPUTS (LEDs)
# ---------------------------------------------------------
output:
  # --- LEDS Port A ---
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 0
      mode: OUTPUT
    id: led_pwr
    inverted: false
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 1
      mode: OUTPUT
    id: led_master
    inverted: false
  # Level LEDs (1-5)
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 2
      mode: OUTPUT
    id: led_l1
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 3
      mode: OUTPUT
    id: led_l2
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 4
      mode: OUTPUT
    id: led_l3
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 5
      mode: OUTPUT
    id: led_l4
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 6
      mode: OUTPUT
    id: led_l5
  # Mode LED WRG
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 7
      mode: OUTPUT
    id: led_wrg

  # --- LEDS Port B ---
  # Mode LED Ventilation
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 8
      mode: OUTPUT
    id: led_vent

  # --- Fan PWM (Standard Output) ---
  - platform: ledc
    pin: GPIO16
    frequency: 25000 Hz
    id: fan_pwm_output
    inverted: true
    min_power: ${min_fan_threshold}%
    zero_means_zero: true

# ---------------------------------------------------------
# LED LIGHTS (Internal Helper)
# ---------------------------------------------------------
light:
  - platform: binary
    output: led_pwr
    id: status_led_power
    internal: true
  - platform: binary
    output: led_master
    id: status_led_master
    internal: true
  - platform: binary
    output: led_wrg
    id: status_led_mode_wrg
    internal: true
  - platform: binary
    output: led_vent
    id: status_led_mode_vent
    internal: true
  # Level LEDs
  - platform: binary
    output: led_l1
    id: status_led_l1
    internal: true
  - platform: binary
    output: led_l2
    id: status_led_l2
    internal: true
  - platform: binary
    output: led_l3
    id: status_led_l3
    internal: true
  - platform: binary
    output: led_l4
    id: status_led_l4
    internal: true
  - platform: binary
    output: led_l5
    id: status_led_l5
    internal: true

# ---------------------------------------------------------
# SENSORS CONFIGURATION
# ---------------------------------------------------------
sensor:
  # BME680 Environmental Data
  - platform: bme68x_bsec2
    temperature:
      name: "BME680 Temperatur"
      id: temperature
      accuracy_decimals: 1
      filters:
        - median:
            window_size: 5
            send_every: 5
    pressure:
      name: "BME680 Luftdruck"
      id: pressure
      accuracy_decimals: 1
    humidity:
      name: "BME680 Luftfeuchtigkeit"
      id: humidity
      accuracy_decimals: 1
    iaq:
      name: "BME680 IAQ"
      id: iaq
      accuracy_decimals: 0
      # Traffic light logic sent via ESP-NOW when IAQ updates
      on_value:
        then:
          - espnow.send:
              address: "98:A3:16:85:96:70"
              data: !lambda |-
                return get_iaq_traffic_light_data(x);
    co2_equivalent:
      name: "BME680 CO2 Äquivalent"
      id: co2_equivalent
      accuracy_decimals: 0

    # Der "Breath VOC equivalent" (b-VOC) Sensorwert des BME680 ist ein berechneter Messwert
    # der Bosch Sensortec Environmental Cluster (BSEC) Software, der die Konzentration flüchtiger
    # organischer Verbindungen (VOCs) in der Atemluft schätzt. Er korreliert den Gaswiderstandssensor
    # mit typischen Ausatemgasen, um ein Maß für die Luftqualität in Innenräumen zu liefern.
    # Anwendung: Dieser Wert hilft, die Belastung der Innenraumluft durch menschliche Ausatemluft zu beurteilen.
    breath_voc_equivalent:
      name: "BME680 Belastung durch Atemluft"
      id: breath_voc_equivalent
      accuracy_decimals: 2

  # ---------------------------------------------------------
  # NTC TEMPERATURE SENSORS (Analog)
  # ---------------------------------------------------------
  # NTC Innen - Indoor air temperature measurement
  - platform: resistance
    id: ntc_innen_resistance
    sensor: ntc_innen_source
    configuration: DOWNSTREAM
    resistor: 10kOhm # Reference resistor in voltage divider
    name: "NTC Innen Widerstand"
    internal: true # Hide raw resistance value

  - platform: ntc
    sensor: ntc_innen_resistance
    name: "Temperatur Zuluft (Innen)"
    id: temp_zuluft
    calibration:
      b_constant: 3435 # Beta coefficient from datasheet
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    accuracy_decimals: 1
    filters:
      - median:
          window_size: 5
          send_every: 3
      - delta: 0.2 # Only report if changed by 0.2°C

  - platform: adc
    id: ntc_innen_source
    pin: GPIO0 # Pin D0 - ADC capable
    attenuation: 12db # For 0-3.3V range (updated from deprecated 11db)
    update_interval: 10s
    internal: true

  # NTC Außen - Outdoor/exhaust air temperature measurement
  - platform: resistance
    id: ntc_aussen_resistance
    sensor: ntc_aussen_source
    configuration: DOWNSTREAM
    resistor: 10kOhm # Reference resistor in voltage divider
    name: "NTC Außen Widerstand"
    internal: true

  - platform: ntc
    sensor: ntc_aussen_resistance
    name: "Temperatur Abluft (Außen)"
    id: temp_abluft
    calibration:
      b_constant: 3435
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    accuracy_decimals: 1
    filters:
      - median:
          window_size: 5
          send_every: 3
      - delta: 0.2

  - platform: adc
    id: ntc_aussen_source
    pin: GPIO1 # Pin D1 - ADC capable
    attenuation: 12db # For 0-3.3V range (updated from deprecated 11db)
    update_interval: 10s
    internal: true

  # ---------------------------------------------------------
  # HEAT RECOVERY EFFICIENCY CALCULATION
  # ---------------------------------------------------------
  # Calculates the efficiency of heat recovery based on temperature difference
  # Formula: Efficiency = (T_zuluft - T_außen) / (T_raum - T_außen) * 100%
  - platform: template
    name: "Wärmerückgewinnung Effizienz"
    id: heat_recovery_efficiency
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:percent"
    update_interval: 30s
    lambda: |-
      return calculate_heat_recovery_efficiency(
        id(temperature).state,     // Room temperature from BME680
        id(temp_zuluft).state,     // Supply air temperature
        id(temp_abluft).state      // Exhaust air temperature
      );

  # Fan Tachometer (RPM) Reading
  - platform: pulse_counter
    pin: GPIO17 # Pin D7 (moved from D1 to free ADC for NTC)
    name: "Lüfter Drehzahl"
    id: fan_rpm
    use_pcnt: true # Use hardware PCNT for efficient pulse counting (recommended for ESP32)
    unit_of_measurement: "RPM"
    update_interval: 1s # 1s Window for stable RPM calculation
    filters:
      - multiply: 0.5 # 2 pulses per revolution -> divide by 2
    on_value:
      then:
        - script.execute: update_leds # Update LEDs on RPM change (optional feedback)

# ---------------------------------------------------------
# TEXT SENSORS (Status & Classification)
# ---------------------------------------------------------
text_sensor:
  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "${device_name} IAQ Accuracy"

  # Human-readable IAQ classification (Good, Average, Bad, etc.)
  - platform: template
    name: "${device_name} IAQ Classification"
    id: iaq_classification
    lambda: |-
      return get_iaq_classification(id(iaq).state);

# ---------------------------------------------------------
# # !alte! FAN OUTPUT CONTROL (PWM)
# ---------------------------------------------------------
# output:
#   - platform: ledc
#     pin: GPIO16 # Pin D6 (moved from D0 to free ADC for NTC sensors)
#     frequency: 25000 Hz # Standard PWM frequency for PC fans
#     id: fan_pwm_output
#     inverted: true # Inverted for NPN Transistor drive (High ESP = Base on = Collector Low)
#     min_power: ${min_fan_threshold}%
#     zero_means_zero: true # Ensure 0% is truly off

fan:
  - platform: speed
    output: fan_pwm_output
    name: "Lüfter"
    id: lueftung_fan
    speed_count: 100 # 1-100% Granularity

# ---------------------------------------------------------
# UI CONTROLS (Home Assistant)
# ---------------------------------------------------------
# Manual Speed Slider
number:
  - platform: template
    name: "Lüfter Geschwindigkeit"
    id: test_speed_slider
    icon: "mdi:fan-speed-3"
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    optimistic: true
    set_action:
      then:
        - if:
            condition:
              lambda: "return is_fan_slider_off(x);"
            then:
              - fan.turn_off: lueftung_fan
            else:
              - fan.turn_on:
                  id: lueftung_fan
                  speed: !lambda |-
                    return x;

  - platform: template
    name: "Durchlüften Dauer (min)"
    id: vent_timer
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    set_action:
      then:
        - logger.log: "Timer updated"
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            uint32_t ms = (uint32_t)x * 60 * 1000;
            // Update the duration but keep current mode
            v->ventilation_duration_ms = ms;

  - platform: template
    name: "Zyklusdauer (eine Richtung)"
    id: cycle_duration_config
    icon: "mdi:timer-sand"
    unit_of_measurement: "s"
    min_value: 10
    max_value: 300
    step: 5
    initial_value: 70
    optimistic: true
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_cycle_duration((uint32_t)x * 1000);

  - platform: template
    name: "Sync Intervall"
    id: sync_interval_config
    icon: "mdi:sync"
    unit_of_measurement: "min"
    min_value: 1
    max_value: 360 # 6 hours
    step: 10
    initial_value: 180 # 3 hours
    optimistic: true
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_sync_interval((uint32_t)x * 60 * 1000);

  - platform: template
    name: "Lüfter Intensität"
    id: fan_intensity_display
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    optimistic: false
    lambda: |-
      return id(fan_intensity_level);
    set_action:
      then:
        - lambda: |-
            id(fan_intensity_level) = (int)x;
            set_fan_intensity_level((int)x);
            id(update_leds).execute();

# ---------------------------------------------------------
# VENTILATION MODE SELECTION
# ---------------------------------------------------------
select:
  # Lüftungsmodus (existing)
  - platform: template
    name: "Lüftungsmodus"
    id: selected_mode
    options:
      - "Wärmerückgewinnung"
      - "Durchlüften"
      - "Aus"
    initial_option: "Wärmerückgewinnung"
    set_action:
      - lambda: |-
          auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
          if (x == "Wärmerückgewinnung") v->set_mode(esphome::MODE_ECO_RECOVERY);
          else if (x == "Durchlüften") {
            // Use the configured timer duration (0 = Infinite)
            uint32_t duration = (uint32_t)(id(vent_timer).state * 60 * 1000);
            v->set_mode(esphome::MODE_VENTILATION, duration);
          }
          else v->set_mode(esphome::MODE_OFF);
          id(update_leds).execute();

# ---------------------------------------------------------
# AUTOMATIONS & SWITCHES
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Lüfter Richtung A"
    id: fan_direction
    optimistic: true

  # Automatic Fan Cycle (Ramp Up -> Hold -> Ramp Down -> Off)
  - platform: template
    name: "Fan Automatic Cycle"
    id: fan_auto_cycle
    optimistic: true
    turn_on_action:
      - script.execute: fan_cycle_logic
    turn_off_action:
      - script.stop: fan_cycle_logic
      - fan.turn_off: lueftung_fan

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # Logic for the Fan Auto Cycle
  - id: fan_cycle_logic
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            # 1. Ramp Up 0 -> 100% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_output
                      level: !lambda |-
                        return calculate_ramp_up(iteration);
                  - delay: 50ms

            # 2. Sync Fan State (ON full speed)
            - fan.turn_on:
                id: lueftung_fan
                speed: 100

            # 3. Hold for 20s
            - delay: 20s

            # 4. Ramp Down 100% -> 0% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_output
                      level: !lambda |-
                        return calculate_ramp_down(iteration);
                  - delay: 50ms

            # 5. Sync Fan State (OFF)
            - fan.turn_off: lueftung_fan

            # 6. Pause before next cycle
            - delay: 100ms

  # LED Logic Handler
  - id: update_leds
    mode: restart
    then:
      - lambda: |-
          update_leds_logic();

# ---------------------------------------------------------
# CONTROL PANEL BUTTONS (Input)
# ---------------------------------------------------------
binary_sensor:
  # Button Mode (Right) - Mode Control
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 14 # GPB6 -> PIN 11 on FFC (Mode)
      mode:
        input: true
        pullup: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Mode"
    id: button_mode
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      then:
        - lambda: |-
            id(current_mode_index) = (id(current_mode_index) + 1) % 3;
            cycle_operating_mode(id(current_mode_index));
            id(update_leds).execute();

  # Button Power (GPB5)
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 13 # GPB5 -> PIN 10 on FFC (Power)
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button Power"
    id: button_power
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_multi_click:
      - timing:
          - ON for at least 1s
        then:
          - lambda: toggle_system_power(); id(update_leds).execute();

  # Button Level (Left) - Fan Intensity Control (GPB7)
  - platform: gpio
    pin:
      mcp23xxx: mcp_hub
      number: 15 # GPB7 -> PIN 12 on FFC (Level)
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button Fan Intensity"
    id: button_level
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      then:
        - lambda: |-
            id(fan_intensity_level) = (id(fan_intensity_level) % 10) + 1;
            set_fan_intensity_level(id(fan_intensity_level));
            id(update_leds).execute();
            ESP_LOGI("button", "Fan intensity set to level %d", id(fan_intensity_level));

# ---------------------------------------------------------
# VENTILATION CONTROL
# ---------------------------------------------------------

# Interval to check for pending broadcasts
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return ((esphome::VentilationController*)id(ventilation_ctrl))->pending_broadcast;"
          then:
            - espnow.send:
                address: "FF:FF:FF:FF:FF:FF"
                data: !lambda |-
                  return ((esphome::VentilationController*)id(ventilation_ctrl))->build_packet(esphome::MSG_SYNC);
