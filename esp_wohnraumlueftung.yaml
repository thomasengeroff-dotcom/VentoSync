substitutions:
  device_name: esptest
  friendly_name: "ESPTest"
  min_fan_threshold: "10"
  
  # VENTILATION CONFIG
  floor_id: "1"
  room_id: "1" 
  device_id: "1"
  # Phase A = Starts with INTAKE (Rein). Phase B = Starts with EXHAUST (Raus).
  # Devices on same wall should have same phase.
  is_phase_a: "true" 

# ---------------------------------------------------------
# PACKAGES & INCLUDES
# ---------------------------------------------------------
# Include common settings (WiFi, Logger, API) and device-specific configs
packages:
  common: !include esp32c6_common.yaml
  apds9960_pkg: !include apds9960_config.yaml

external_components:
  - source:
      type: local
      path: components

esphome:
  includes:
    - display_render.h   # Custom C++ code for drawing the OLED interface
    - automation_helpers.h # Helper functions logic
  on_boot:
    priority: 600
    then:
      # Briefly flash the display on boot to indicate life
      - switch.turn_on: switch_display
      - delay: 10s
      - switch.turn_off: switch_display

# ---------------------------------------------------------
# GLOBAL VARIABLES (State Memory)
# ---------------------------------------------------------
globals:
  # Main system power state
  - id: system_on
    type: bool
    initial_value: 'true'
  # Display state tracker (to prevent unnecessary I2C traffic when off)
  - id: display_awake
    type: bool
    initial_value: 'false'

# ---------------------------------------------------------
# VENTILATION COMPONENT (External)
# ---------------------------------------------------------
ventilation_group:
  id: ventilation_ctrl
  floor_id: ${floor_id}
  room_id: ${room_id}
  device_id: ${device_id}
  is_phase_a: ${is_phase_a}
  main_fan: lueftung_fan
  direction_switch: fan_direction

# ---------------------------------------------------------
# ESP-NOW COMMUNICATION
# ---------------------------------------------------------
# Configures peer-to-peer communication with the Slave/Consumer device
espnow:
  peers:
    - "98:A3:16:85:96:70"  # Target MAC Address (Slave)
    - "FF:FF:FF:FF:FF:FF"  # Broadcast for Discovery/Sync
  on_receive:
    then:
      - lambda: |-
          std::vector<uint8_t> packet(data, data + size);
          ((esphome::VentilationController*)id(ventilation_ctrl))->on_packet_received(packet);

packet_transport:
  - platform: espnow
    # Encryption is currently disabled/commented out
    # encryption: "HubSecret123" 
    peer_address: "98:A3:16:85:96:70"
    sensors:
      # Data sent over ESP-NOW to the other device
      - iaq
      - temperature

# ---------------------------------------------------------
# I2C BUS CONFIGURATION
# ---------------------------------------------------------
i2c:
  sda: GPIO22  # Pin D4 on XIAO ESP32C6
  scl: GPIO23  # Pin D5 on XIAO ESP32C6
  scan: true
  id: bus_a
  frequency: 400kHz # High Speed I2C for smoother display updates
  timeout: 50ms     # Increased timeout to prevent "software timeout" errors

# Note: APDS9960 configuration is now in apds9960_config.yaml

# ---------------------------------------------------------
# BME680 SENSOR (BSEC2)
# ---------------------------------------------------------
# Configured via I2C at address 0x77
bme68x_bsec2_i2c:
  address: 0x77
  model: bme680
  operating_age: 28d # Time for the sensor to reach stable calibration
  sample_rate: LP    # Low Power mode (sampling every 3s)
  supply_voltage: 3.3V

# ---------------------------------------------------------
# FONTS & ICONS
# ---------------------------------------------------------
font:
  # Tiny text for units and labels (10px)
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

  # Main text for measurement values (14px)
  - file: "gfonts://Roboto"
    id: font_medium
    size: 14

  # Material Design Icons (must be present in config folder)
  - file: "materialdesignicons-webfont.ttf"
    id: icon_font
    size: 14
    glyphs:
      - "\U000F050F" # Thermometer (mdi-thermometer)
      - "\U000F058E" # Water drop (mdi-water-percent)
      - "\U000F0210" # Fan (mdi-fan)
      - "\U000F002F" # Air Filter/IAQ (mdi-air-filter)
      - "\U000F0339" # Gauge (mdi-gauge - for pressure)

# ---------------------------------------------------------
# DISPLAY CONFIGURATION (SSD1306)
# ---------------------------------------------------------
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    i2c_id: bus_a
    id: test_display 
    rotation: 0
    # Custom rendering lambda located in display_render.h
    lambda: |-
      draw_main_page(it, id(font_small), id(font_medium), id(icon_font), 
                     id(fan_rpm), id(temperature), id(iaq), id(humidity), 
                     id(breath_voc_equivalent), id(pressure));

# ---------------------------------------------------------
# SENSORS CONFIGURATION
# ---------------------------------------------------------
sensor:
  # BME680 Environmental Data
  - platform: bme68x_bsec2
    temperature:
      name: "BME680 Temperatur"
      id: temperature
    pressure:
      name: "BME680 Luftdruck"
      id: pressure
    humidity:
      name: "BME680 Luftfeuchtigkeit"
      id: humidity
    iaq:
      name: "BME680 IAQ"
      id: iaq
      # Traffic light logic sent via ESP-NOW when IAQ updates
      on_value:
        then:
          - espnow.send:
              address: "98:A3:16:85:96:70"
              data: !lambda 'return get_iaq_traffic_light_data(x);'
    co2_equivalent:
      name: "BME680 CO2 Äquivalent"
      id: co2_equivalent
    
    # Der "Breath VOC equivalent" (b-VOC) Sensorwert des BME680 ist ein berechneter Messwert 
    # der Bosch Sensortec Environmental Cluster (BSEC) Software, der die Konzentration flüchtiger 
    # organischer Verbindungen (VOCs) in der Atemluft schätzt. Er korreliert den Gaswiderstandssensor 
    # mit typischen Ausatemgasen, um ein Maß für die Luftqualität in Innenräumen zu liefern. 
    # Anwendung: Dieser Wert hilft, die Belastung der Innenraumluft durch menschliche Ausatemluft zu beurteilen.
    breath_voc_equivalent:
      name: "BME680 Belastung durch Atemluft"
      id: breath_voc_equivalent
      
  # Fan Tachometer (RPM) Reading
  - platform: pulse_counter
    pin: GPIO1 # Pin D1
    name: "Lüfter Drehzahl"
    id: fan_rpm
    use_pcnt: true # if fails use ISR instead of hardware PCNT (Legacy driver issue on C6)
    unit_of_measurement: 'RPM'
    update_interval: 1s # 1s Window for stable RPM calculation
    filters:
      - multiply: 0.5 # 2 pulses per revolution -> divide by 2
    on_value:
      then:
        - component.update: test_display # Force display update on RPM change

# ---------------------------------------------------------
# TEXT SENSORS (Status & Classification)
# ---------------------------------------------------------
text_sensor:
  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "${device_name} IAQ Accuracy"

  # Human-readable IAQ classification (Good, Average, Bad, etc.)
  - platform: template
    name: "${device_name} IAQ Classification"
    id: iaq_classification
    lambda: |-
      return get_iaq_classification(id(iaq).state);

# ---------------------------------------------------------
# FAN OUTPUT CONTROL (PWM)
# ---------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO0 # Pin D0
    frequency: 25000 Hz # Standard PWM frequency for PC fans
    id: fan_pwm_output
    inverted: true # Inverted for NPN Transistor drive (High ESP = Base on = Collector Low)
    min_power: ${min_fan_threshold}%
    zero_means_zero: true # Ensure 0% is truly off

fan:
  - platform: speed
    output: fan_pwm_output
    name: "Lüfter"
    id: lueftung_fan
    speed_count: 100 # 1-100% Granularity

# ---------------------------------------------------------
# UI CONTROLS (Home Assistant)
# ---------------------------------------------------------
# Manual Speed Slider
number:
  - platform: template
    name: "Lüfter Geschwindigkeit"
    id: test_speed_slider
    icon: "mdi:fan-speed-3"
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    optimistic: true
    set_action:
      then:
        - if:
            condition:
              lambda: 'return is_fan_slider_off(x);'
            then:
              - fan.turn_off: lueftung_fan
            else:
              - fan.turn_on:
                  id: lueftung_fan
                  speed: !lambda 'return x;'

  - platform: template
    name: "Durchlüften Dauer (min)"
    id: vent_timer
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    set_action:
      then:
        - logger.log: "Timer updated"
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            uint32_t ms = (uint32_t)x * 60 * 1000;
            // Update the duration but keep current mode
            v->ventilation_duration_ms = ms;

  - platform: template
    name: "Zyklusdauer (eine Richtung)"
    id: cycle_duration_config
    icon: "mdi:timer-sand"
    unit_of_measurement: "s"
    min_value: 10
    max_value: 300
    step: 5
    initial_value: 70
    optimistic: true
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_cycle_duration((uint32_t)x * 1000);

  - platform: template
    name: "Sync Intervall"
    id: sync_interval_config
    icon: "mdi:sync"
    unit_of_measurement: "min"
    min_value: 1
    max_value: 360 # 6 hours
    step: 10
    initial_value: 180 # 3 hours
    optimistic: true
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_sync_interval((uint32_t)x * 60 * 1000);

# ---------------------------------------------------------
# AUTOMATIONS & SWITCHES
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Lüfter Richtung A"
    id: fan_direction
    optimistic: true

  # Automatic Fan Cycle (Ramp Up -> Hold -> Ramp Down -> Off)
  - platform: template
    name: "Fan Automatic Cycle"
    id: fan_auto_cycle
    optimistic: true
    turn_on_action:
      - script.execute: fan_cycle_logic
    turn_off_action:
      - script.stop: fan_cycle_logic
      - fan.turn_off: lueftung_fan



  # Display Toggle (saves OLED life)
  - platform: template
    name: "Display Switch"
    id: switch_display
    optimistic: true
    turn_on_action:
      - globals.set:
          id: display_awake
          value: 'true'
      - lambda: id(test_display).turn_on();
    turn_off_action:
      - globals.set:
          id: display_awake
          value: 'false'
      - lambda: id(test_display).turn_off();
    lambda: |-
      return id(display_awake);

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # Logic for the Fan Auto Cycle
  - id: fan_cycle_logic
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            # 1. Ramp Up 0 -> 100% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_output
                      level: !lambda 'return calculate_ramp_up(iteration);'
                  - delay: 50ms
                  
            # 2. Sync Fan State (ON full speed)
            - fan.turn_on:
                id: lueftung_fan
                speed: 100
                
            # 3. Hold for 20s
            - delay: 20s
            
            # 4. Ramp Down 100% -> 0% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_output
                      level: !lambda 'return calculate_ramp_down(iteration);'
                  - delay: 50ms
            
            # 5. Sync Fan State (OFF)
            - fan.turn_off: lueftung_fan

            # 6. Pause before next cycle
            - delay: 100ms

  # Auto-off timer for display
  - id: timeout_display
    mode: restart
    then:
      - delay: 5s
      - switch.turn_off: switch_display

# ---------------------------------------------------------
# TOUCH BUTTON (Input)
# ---------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO21  # Pin D3 on XIAO ESP32C6
      mode:
        input: true
        pullup: true  # Capacitive sensors usually require pullup
    name: "Button Display"
    id: touch_button
    filters:
      - delayed_on: 50ms  # Debounce press
      - delayed_off: 50ms # Debounce release
    on_press:
      then:
        - logger.log: "Touch Button: PRESSED"
        - switch.toggle: switch_display
    on_release:
      then:
        - logger.log: "Touch Button: RELEASED"
        
# ---------------------------------------------------------
# VENTILATION CONTROL
# ---------------------------------------------------------

# Select for Mode
select:
  - platform: template
    name: "Lüftungsmodus"
    id: selected_mode
    options:
      - "Wärmerückgewinnung"
      - "Durchlüften"
      - "Aus"
    initial_option: "Wärmerückgewinnung"
    set_action:
      - lambda: |-
          auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
          if (x == "Wärmerückgewinnung") v->set_mode(esphome::MODE_ECO_RECOVERY);
          else if (x == "Durchlüften") {
            // Use the configured timer duration (0 = Infinite)
            uint32_t duration = (uint32_t)(id(vent_timer).state * 60 * 1000);
            v->set_mode(esphome::MODE_VENTILATION, duration);
          }
          else v->set_mode(esphome::MODE_OFF);



# Interval to check for pending broadcasts
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return ((esphome::VentilationController*)id(ventilation_ctrl))->pending_broadcast;'
          then:
            - espnow.send:
                address: "FF:FF:FF:FF:FF:FF"
                data: !lambda 'return ((esphome::VentilationController*)id(ventilation_ctrl))->build_packet(esphome::MSG_SYNC);'