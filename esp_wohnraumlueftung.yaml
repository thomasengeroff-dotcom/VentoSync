# File:        esp_wohnraumlueftung.yaml
# Description: Main ESPHome configuration for the room ventilation system.
#              Controls fan, clusters via ESP-NOW, and integrates with HA.
# Author:      Thomas Engeroff
# Created:     2026-01-27
# Modified:    2026-03-21
# ==========================================================================
substitutions:
  device_name: espwrglueftung
  friendly_name: "ESP-WRG-Lüftung"

  # VENTILATION CONFIG - Default Values
  # These are initial values. The actual configuration can be changed
  # via Home Assistant and is stored persistently in flash memory.
  floor_id: "1"
  room_id: "1"
  device_id: "1"
  # Phase A = Starts with INTAKE (Rein). Phase B = Starts with EXHAUST (Raus).
  # Devices on same wall should have same phase.
  is_phase_a: "true"

# ---------------------------------------------------------
# PACKAGES & INCLUDES
# ---------------------------------------------------------
# Include common settings (WiFi, Logger, API) and device-specific configs
packages:
  common: !include packages/esp32c6_common.yaml
  device_config_pkg: !include packages/device_config.yaml
  hardware: !include packages/hardware_io.yaml
  sensors: !include packages/sensors_climate.yaml
  fan_hardware: !include packages/hardware_fan.yaml
  bmp390: !include packages/sensor_BMP390.yaml
  scd41: !include packages/sensor_SCD41.yaml
  ntc: !include packages/sensor_NTC.yaml
  bme680: !include packages/sensor_BME680.yaml
  ld2450: !include packages/sensor_LD2450.yaml
  ui: !include packages/ui_controls.yaml
  logic: !include packages/logic_automation.yaml

external_components:
  - source:
      type: local
      path: components

esphome:
  includes:
    - components/automation_helpers.h # Helper functions logic
    - components/helpers
  on_boot:
    - priority: -10.0 # -10 ensure WiFi and NVS are ready before syncing.
      then:
        - delay: 2s # Wait for all components/NVS to stabilize
        - lambda: |-
            sync_config_to_controller();
            if (current_mode_index != nullptr) {
              cycle_operating_mode(current_mode_index->value());
            }

  name_add_mac_suffix: true # Adds MAC address to device name (because same firmware is used for all devices)

# ---------------------------------------------------------
# GLOBAL VARIABLES (State Memory)
# ---------------------------------------------------------
globals:
  # Main system power state
  - id: system_on
    type: bool
    initial_value: "true"

  # Ventilation enabled state (referenced by button logic)
  - id: ventilation_enabled
    type: bool
    initial_value: "true"

  # Operating mode (0=WRG, 1=Durchlüften, 2=Aus)
  - id: operating_mode
    type: int
    initial_value: "0"
    restore_value: true

  # Fan intensity level (1-10)
  - id: fan_intensity_level
    type: int
    initial_value: "2" # Start at lower medium intensity
    restore_value: true

  # Current operating mode index (0=Automatik, 1=WRG, 2=Durchlüften, 3=Stoßlüftung, 4=Aus)
  - id: current_mode_index
    type: int
    initial_value: "0" # Default: Smart-Automatik
    restore_value: true

  # ESP-NOW dynamic peer list
  - id: espnow_peers
    type: std::string
    max_restore_data_length: 254
    initial_value: '""'
    restore_value: true

  # CO2 auto-control enabled (only functional when SCD41 is connected)
  - id: co2_auto_enabled
    type: bool
    initial_value: "true" # Default: enabled in Smart-Automatik
    restore_value: true

  # Automatik: min fan level (moisture protection / DIN 1946-6 Feuchteschutz)
  - id: automatik_min_fan_level
    type: int
    initial_value: "2"
    restore_value: true

  # Automatik: max fan level (noise control)
  - id: automatik_max_fan_level
    type: int
    initial_value: "7"
    restore_value: true

  # Automatik Modus Aktivierungsstatus
  - id: auto_mode_active
    type: bool
    initial_value: "true"
    restore_value: true

  # Automatik CO2 Grenzwert (Wert in ppm, ab dem hochgeregelt wird)
  - id: auto_co2_threshold_val
    type: int
    initial_value: "1000"
    restore_value: true

  # Automatik Feuchte Grenzwert (Wert in %, ab dem hochgeregelt wird)
  - id: auto_humidity_threshold_val
    type: int
    initial_value: "60"
    restore_value: true

  # Anwesenheits-Lüfter-Anpassung (-5 bis +5)
  - id: auto_presence_val
    type: int
    initial_value: "0"
    restore_value: true

  # PID Control Outputs (0.0 to 1.0)
  - id: co2_pid_result
    type: float
    initial_value: "0.0"

  - id: humidity_pid_result
    type: float
    initial_value: "0.0"

  # Filter Maintenance Tracking
  - id: filter_operating_hours
    type: float
    initial_value: "0.0"
    restore_value: true

  - id: filter_last_change_ts
    type: int
    initial_value: "0"
    restore_value: true

  # UI state tracking
  - id: ui_active
    type: bool
    initial_value: "false"

  # ESP-NOW peer check (disable to suppress Master LED blinking when no peers are connected)
  - id: peer_check_enabled
    type: bool
    initial_value: "true"
    restore_value: true

  # LED Brightness control
  - id: max_led_brightness
    type: float
    initial_value: "0.8"
    restore_value: true

# ---------------------------------------------------------
# VENTILATION COMPONENT (External)
# ---------------------------------------------------------
ventilation_group:
  id: ventilation_ctrl
  floor_id: ${floor_id}
  room_id: ${room_id}
  device_id: ${device_id}
  is_phase_a: ${is_phase_a}
  main_fan: lueftung_fan
  direction_switch: fan_direction
  fan_rpm_sensor: fan_rpm
  board_temp_sensor: temperature
  scd41_temp_sensor: scd41_temperature
  bme680_temp_sensor: bme680_temperature

# Pure C++ helper library (IAQ classification, ramp logic, fan level cycling)
ventilation_logic:

# ---------------------------------------------------------
# ESP-NOW COMMUNICATION
# ---------------------------------------------------------
# Configures peer-to-peer communication with the Slave/Consumer device
espnow:
  id: espnow_component
  auto_add_peer: true
  peers:
    - FF:FF:FF:FF:FF:FF # Broadcast for Discovery/Sync

  # on_receive ONLY triggers for registered peers (defined above).
  # Since we use broadcasts for the whole group, on_broadcast is REQUIRED.
  on_broadcast:
    - lambda: |-
        std::string payload((const char*)data, size);
        if (handle_discovery_payload(payload, info.src_addr)) {
          return;
        }
        std::vector<uint8_t> packet(data, data + size);
        handle_espnow_receive(packet);

  # For robustness, we also handle registered peers (e.g. if we add them dynamically)
  on_receive:
    - lambda: |-
        std::string payload((const char*)data, size);
        if (handle_discovery_payload(payload, info.src_addr)) {
          return;
        }
        std::vector<uint8_t> packet(data, data + size);
        handle_espnow_receive(packet);

  on_unknown_peer:
    - lambda: |-
        std::string payload((const char*)data, size);
        if (handle_discovery_payload(payload, info.src_addr)) {
          return;
        }
        std::vector<uint8_t> packet(data, data + size);
        handle_espnow_receive(packet);

