substitutions:
  device_name: esptest
  friendly_name: "ESPTest"
  min_fan_threshold: "10"

  # VENTILATION CONFIG - Default Values
  # These are initial values. The actual configuration can be changed
  # via Home Assistant and is stored persistently in flash memory.
  floor_id: "1"
  room_id: "1"
  device_id: "1"
  # Phase A = Starts with INTAKE (Rein). Phase B = Starts with EXHAUST (Raus).
  # Devices on same wall should have same phase.
  is_phase_a: "true"

# ---------------------------------------------------------
# PACKAGES & INCLUDES
# ---------------------------------------------------------
# Include common settings (WiFi, Logger, API) and device-specific configs
packages:
  common: !include esp32c6_common.yaml
  device_config_pkg: !include device_config.yaml

external_components:
  - source:
      type: local
      path: components

esphome:
  includes:
    - automation_helpers.h # Helper functions logic
  on_boot:
    priority: 600
    then:
      - script.execute: update_leds

# ---------------------------------------------------------
# GLOBAL VARIABLES (State Memory)
# ---------------------------------------------------------
globals:
  # Main system power state
  - id: system_on
    type: bool
    initial_value: "true"

  # Ventilation enabled state (referenced by button logic)
  - id: ventilation_enabled
    type: bool
    initial_value: "true"

  # Operating mode (0=WRG, 1=Durchlüften, 2=Aus)
  - id: operating_mode
    type: int
    initial_value: "0"

  # Fan intensity level (1-10)
  - id: fan_intensity_level
    type: int
    initial_value: "5" # Start at medium intensity

  # Current operating mode index (0=WRG, 1=Durchlüften, 2=Aus)
  - id: current_mode_index
    type: int
    initial_value: "0"

# ---------------------------------------------------------
# VENTILATION COMPONENT (External)
# ---------------------------------------------------------
ventilation_group:
  id: ventilation_ctrl
  floor_id: ${floor_id}
  room_id: ${room_id}
  device_id: ${device_id}
  is_phase_a: ${is_phase_a}
  main_fan: lueftung_fan
  direction_switch: fan_direction

# ---------------------------------------------------------
# ESP-NOW COMMUNICATION
# ---------------------------------------------------------
# Configures peer-to-peer communication with the Slave/Consumer device
espnow:
  peers:
    # - "98:A3:16:85:96:70" # Target MAC Address (Slave)
    - "FF:FF:FF:FF:FF:FF" # Broadcast for Discovery/Sync
  on_receive:
    then:
      - lambda: |-
          std::vector<uint8_t> packet(data, data + size);
          handle_espnow_receive(packet);

# packet_transport:
#   - platform: espnow
#     # Encryption is currently disabled/commented out
#     # encryption: "HubSecret123"
#     peer_address: "98:A3:16:85:96:70"
#     sensors:
#       # Data sent over ESP-NOW to the other device
#       - iaq
#       - temperature

# ---------------------------------------------------------
# I2C BUS CONFIGURATION
# ---------------------------------------------------------
i2c:
  sda: GPIO22 # Pin D4 on XIAO ESP32C6
  scl: GPIO23 # Pin D5 on XIAO ESP32C6
  scan: true
  id: bus_a
  frequency: 400kHz # Fast I2C Mode (400kHz)
  timeout: 50ms # Increased timeout to prevent "software timeout" errors

# ---------------------------------------------------------
# PCA9685 I/O EXPANDER (LED Driver)
# ---------------------------------------------------------
pca9685:
  - id: pwm_hub
    frequency: 1000Hz
    address: 0x40

# ---------------------------------------------------------
# BME680 SENSOR (BSEC2)
# ---------------------------------------------------------
# Configured via I2C at address 0x77
bme68x_bsec2_i2c:
  address: 0x77
  model: bme680
  operating_age: 28d # Time for the sensor to reach stable calibration
  sample_rate: LP # Low Power mode (sampling every 3s)
  supply_voltage: 3.3V
  temperature_offset: 0.0 # Adjusted for room temperature
  state_save_interval: 6h # Save state every 6 hours

# ---------------------------------------------------------
# PCA9685 OUTPUTS (LEDs)
# ---------------------------------------------------------
output:
  # --- LEDS Port A (Channels 6-15) ---
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 6
    id: out_led_pwr
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 7
    id: out_led_master

  # Level LEDs (Channels 8-12)
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 8
    id: out_led_l1
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 9
    id: out_led_l2
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 10
    id: out_led_l3
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 11
    id: out_led_l4
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 12
    id: out_led_l5

  # Mode LED WRG (Channel 13)
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 13
    id: out_led_wrg

  # --- LEDS Port B (Channel 15) ---
  # Mode LED Ventilation
  - platform: pca9685
    pca9685_id: pwm_hub
    channel: 15
    id: out_led_vent

  # --- Fan PWM (Standard Output) ---
  # Hardware: High-Side Circuit (4-Pin Mode)
  #   GPIO16 -> R3 (1kΩ) -> Q3 Base (NPN S8050)
  #   Q3 Collector -> Q1 Gate (PMOS AO3401) + R8 (2.2kΩ) Pullup to 12V
  #   Q1 Source: +12V, Q1 Drain: PWM_12V_OUT
  #   D1 (B5819WS): Flyback diode at PWM_12V_OUT (Cathode -> Drain, Anode -> GND)
  #   PWM_12V_OUT -> L1 (470µH) -> DC_VAR_12V -> C27 (100µF) -> GND
  #
  # Hardware: Dual Low-Side Circuit (3-Pin Dual-GND Mode)
  #   GPIO16 -> Gate Q5 (NMOS PMV16XNR) + R19 (10kΩ) pull-down to GND
  #   Q5 controls Fan GND1, D2 (B5819WS) protection at Fan Pin 1
  #
  # Primary PWM (GPIO16)
  # - 4-Pin Mode: PWM signal via Q3/Q1 high-side circuit to fan PWM pin
  # - 3-Pin Dual-GND Mode: Controls GND1 via low-side MOSFET Q5
  - platform: ledc
    pin: GPIO16
    frequency: 28000 Hz # Changed from 25kHz to 28kHz for silent operation
    id: fan_pwm_primary
    inverted: false # Changed: no inversion needed for low-side MOSFETs
    min_power: 0%
    zero_means_zero: true

  # Secondary PWM (GPIO2) - Only for 3-Pin Dual-GND Mode
  # GPIO2 -> Gate Q4 (NMOS PMV16XNR) + R18 (10kΩ) pull-down to GND
  # Q4 controls Fan GND2, D3 (B5819WS) protection at Fan Pin 4
  - platform: ledc
    pin: GPIO2
    frequency: 28000 Hz
    id: fan_pwm_secondary
    inverted: false
    min_power: 0%
    zero_means_zero: true

# ---------------------------------------------------------
# LED LIGHTS (Monochromatic for Dimming)
# ---------------------------------------------------------
light:
  - platform: monochromatic
    output: out_led_pwr
    name: "Status LED Power"
    id: status_led_power
    internal: true
    default_transition_length: 0.5s
  - platform: monochromatic
    output: out_led_master
    name: "Status LED Master"
    id: status_led_master
    internal: true
    default_transition_length: 0.5s
  - platform: monochromatic
    output: out_led_wrg
    name: "Status LED Mode WRG"
    id: status_led_mode_wrg # ID expected by automation_helpers.h
    internal: true
    default_transition_length: 0.5s
  - platform: monochromatic
    output: out_led_vent
    name: "Status LED Mode Vent"
    id: status_led_mode_vent # Automation helper expects this ID
    internal: true
    default_transition_length: 0.5s

  # Level LEDs
  - platform: monochromatic
    output: out_led_l1
    id: status_led_l1
    internal: true
    default_transition_length: 0.2s
  - platform: monochromatic
    output: out_led_l2
    id: status_led_l2
    internal: true
    default_transition_length: 0.2s
  - platform: monochromatic
    output: out_led_l3
    id: status_led_l3
    internal: true
    default_transition_length: 0.2s
  - platform: monochromatic
    output: out_led_l4
    id: status_led_l4
    internal: true
    default_transition_length: 0.2s
  - platform: monochromatic
    output: out_led_l5
    id: status_led_l5
    internal: true
    default_transition_length: 0.2s

# Alias for ID consistency if needed, but I kept IDs same as before where possible.
# Exception: status_led_wrg vs status_led_mode_wrg.
# Helper uses: status_led_power, status_led_master, status_led_mode_wrg, status_led_mode_vent, status_led_l1..l5
# IDs above match helpers.

# ---------------------------------------------------------
# SENSORS CONFIGURATION
# ---------------------------------------------------------
sensor:
  # BME680 Environmental Data
  - platform: bme68x_bsec2
    temperature:
      name: "BME680 Temperatur"
      id: temperature
      accuracy_decimals: 1
      filters:
        - median:
            window_size: 5
            send_every: 5
    pressure:
      name: "BME680 Luftdruck"
      id: pressure
      accuracy_decimals: 1
    humidity:
      name: "BME680 Luftfeuchtigkeit"
      id: humidity
      accuracy_decimals: 1
    iaq:
      name: "BME680 IAQ"
      id: iaq
      accuracy_decimals: 0
      # Traffic light logic sent via ESP-NOW when IAQ updates
      on_value:
        then:
          - espnow.send:
              address: "98:A3:16:85:96:70"
              data: !lambda |-
                return get_iaq_traffic_light_data(x);
    co2_equivalent:
      name: "BME680 CO2 Äquivalent"
      id: co2_equivalent
      accuracy_decimals: 0

    # Der "Breath VOC equivalent" (b-VOC) Sensorwert des BME680 ist ein berechneter Messwert
    # der Bosch Sensortec Environmental Cluster (BSEC) Software, der die Konzentration flüchtiger
    # organischer Verbindungen (VOCs) in der Atemluft schätzt. Er korreliert den Gaswiderstandssensor
    # mit typischen Ausatemgasen, um ein Maß für die Luftqualität in Innenräumen zu liefern.
    # Anwendung: Dieser Wert hilft, die Belastung der Innenraumluft durch menschliche Ausatemluft zu beurteilen.
    breath_voc_equivalent:
      name: "BME680 Belastung durch Atemluft"
      id: breath_voc_equivalent
      accuracy_decimals: 2

  # ---------------------------------------------------------
  # SCD41 CO2 SENSOR (Optional)
  # ---------------------------------------------------------
  # Will show as "unavailable" until sensor is connected to H2 header
  - platform: scd4x
    co2:
      name: "CO2"
      id: co2_sensor
      accuracy_decimals: 0
      filters:
        - median:
            window_size: 5
            send_every: 3
    temperature:
      name: "SCD41 Temperatur"
      id: scd41_temperature
      accuracy_decimals: 1
    humidity:
      name: "SCD41 Luftfeuchtigkeit"
      id: scd41_humidity
      accuracy_decimals: 1

  # ---------------------------------------------------------
  # NTC TEMPERATURE SENSORS (Analog)
  # ---------------------------------------------------------
  # NTC Innen - Indoor air temperature measurement
  - platform: resistance
    id: ntc_innen_resistance
    sensor: ntc_innen_source
    configuration: DOWNSTREAM
    resistor: 10kOhm # Reference resistor in voltage divider
    name: "NTC Innen Widerstand"
    internal: true # Hide raw resistance value

  - platform: ntc
    sensor: ntc_innen_resistance
    name: "Temperatur Zuluft (Innen)"
    id: temp_zuluft
    calibration:
      b_constant: 3435 # Beta coefficient from datasheet
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    accuracy_decimals: 1
    filters:
      - median:
          window_size: 5
          send_every: 3
      - delta: 0.2 # Only report if changed by 0.2°C

  - platform: adc
    id: ntc_innen_source
    pin: GPIO0 # Pin D0 - ADC capable
    attenuation: 12db # For 0-3.3V range (updated from deprecated 11db)
    update_interval: 10s
    internal: true

  # NTC Außen - Outdoor/exhaust air temperature measurement
  - platform: resistance
    id: ntc_aussen_resistance
    sensor: ntc_aussen_source
    configuration: DOWNSTREAM
    resistor: 10kOhm # Reference resistor in voltage divider
    name: "NTC Außen Widerstand"
    internal: true

  - platform: ntc
    sensor: ntc_aussen_resistance
    name: "Temperatur Abluft (Außen)"
    id: temp_abluft
    calibration:
      b_constant: 3435
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    accuracy_decimals: 1
    filters:
      - median:
          window_size: 5
          send_every: 3
      - delta: 0.2

  - platform: adc
    id: ntc_aussen_source
    pin: GPIO1 # Pin D1 - ADC capable
    attenuation: 12db # For 0-3.3V range (updated from deprecated 11db)
    update_interval: 10s
    internal: true

  # ---------------------------------------------------------
  # HEAT RECOVERY EFFICIENCY CALCULATION
  # ---------------------------------------------------------
  # Calculates the efficiency of heat recovery based on temperature difference
  # Formula: Efficiency = (T_zuluft - T_außen) / (T_raum - T_außen) * 100%
  - platform: template
    name: "Wärmerückgewinnung Effizienz"
    id: heat_recovery_efficiency
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:percent"
    update_interval: 30s
    lambda: |-
      return calculate_heat_recovery_efficiency(
        id(temperature).state,     // Room temperature from BME680
        id(temp_zuluft).state,     // Supply air temperature
        id(temp_abluft).state      // Exhaust air temperature
      );

  # Fan Tachometer (RPM) Reading
  - platform: pulse_counter
    pin: GPIO17 # Pin D7 (moved from D1 to free ADC for NTC)
    name: "Lüfter Drehzahl"
    id: fan_rpm
    use_pcnt: true # Use hardware PCNT for efficient pulse counting (recommended for ESP32)
    unit_of_measurement: "RPM"
    update_interval: 1s # 1s Window for stable RPM calculation
    filters:
      - multiply: 0.5 # 2 pulses per revolution -> divide by 2
    on_value:
      then:
        - script.execute: update_leds # Update LEDs on RPM change (optional feedback)

# ---------------------------------------------------------
# TEXT SENSORS (Status & Classification)
# ---------------------------------------------------------
text_sensor:
  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "${device_name} IAQ Accuracy"

  # Human-readable IAQ classification (Good, Average, Bad, etc.)
  - platform: template
    name: "${device_name} IAQ Classification"
    id: iaq_classification
    lambda: |-
      return get_iaq_classification(id(iaq).state);

fan:
  - platform: speed
    output: fan_pwm_primary # Changed from fan_pwm_output
    name: "Lüfter"
    id: lueftung_fan
    speed_count: 100 # 1-100% Granularity

# ---------------------------------------------------------
# UI CONTROLS (Home Assistant)
# ---------------------------------------------------------
# Manual Speed Slider
number:
  - platform: template
    name: "Lüfter Geschwindigkeit"
    id: test_speed_slider
    icon: "mdi:fan-speed-3"
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    optimistic: true
    set_action:
      then:
        - if:
            condition:
              lambda: "return is_fan_slider_off(x);"
            then:
              - fan.turn_off: lueftung_fan
            else:
              - fan.turn_on:
                  id: lueftung_fan
                  speed: !lambda |-
                    return x;

  - platform: template
    name: "Durchlüften Dauer (min)"
    id: vent_timer
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    set_action:
      then:
        - lambda: |-
            set_ventilation_timer(x);

  - platform: template
    name: "Zyklusdauer (eine Richtung)"
    id: cycle_duration_config
    icon: "mdi:timer-sand"
    unit_of_measurement: "s"
    min_value: 10
    max_value: 300
    step: 5
    initial_value: 70
    optimistic: true
    set_action:
      then:
        - lambda: |-
            set_cycle_duration_handler(x);

  - platform: template
    name: "Sync Intervall"
    id: sync_interval_config
    icon: "mdi:sync"
    unit_of_measurement: "min"
    min_value: 1
    max_value: 360 # 6 hours
    step: 10
    initial_value: 180 # 3 hours
    optimistic: true
    set_action:
      then:
        - lambda: |-
            set_sync_interval_handler(x);

  - platform: template
    name: "Lüfter Intensität"
    id: fan_intensity_display
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    optimistic: false
    lambda: |-
      return id(fan_intensity_level);
    set_action:
      then:
        - lambda: |-
            set_fan_intensity_slider(x);

# ---------------------------------------------------------
# VENTILATION MODE SELECTION
# ---------------------------------------------------------
select:
  # Lüftungsmodus (existing)
  - platform: template
    name: "Lüftungsmodus"
    id: selected_mode
    options:
      - "Wärmerückgewinnung"
      - "Stoßlüftung"
      - "Durchlüften"
      - "Aus"
    initial_option: "Wärmerückgewinnung"
    set_action:
      - lambda: |-
          set_operating_mode_select(x.c_str());

  # Fan Control Mode (NEW)
  - platform: template
    name: "Fan Control Mode"
    id: fan_mode_select
    options:
      - "4-Pin PWM"
      - "3-Pin Dual-GND"
    initial_option: "4-Pin PWM"
    optimistic: true
    on_value:
      then:
        - logger.log:
            format: "Fan control mode changed to: %s"
            args: ["x.c_str()"]
        - script.execute: fan_speed_update

# ---------------------------------------------------------
# AUTOMATIONS & SWITCHES
# ---------------------------------------------------------
switch:
  # PCA9685 Output Enable (Active Low)
  - platform: gpio
    pin:
      number: GPIO21
      inverted: true
    name: "PCA9685 Output Enable"
    id: pca9685_oe
    restore_mode: ALWAYS_ON
    internal: true

  - platform: template
    name: "Lüfter Richtung A"
    id: fan_direction
    optimistic: true
    # OFF = Direction A (GND1), ON = Direction B (GND2)
    on_turn_on:
      - script.execute: fan_speed_update
    on_turn_off:
      - script.execute: fan_speed_update

  # Automatic Fan Cycle (Ramp Up -> Hold -> Ramp Down -> Off)
  - platform: template
    name: "Fan Automatic Cycle"
    id: fan_auto_cycle
    optimistic: true
    turn_on_action:
      - script.execute: fan_cycle_logic
    turn_off_action:
      - script.stop: fan_cycle_logic
      - fan.turn_off: lueftung_fan

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # Logic for the Fan Auto Cycle
  - id: fan_cycle_logic
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            # 1. Ramp Up 0 -> 100% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_primary
                      level: !lambda |-
                        return calculate_ramp_up(iteration);
                  - delay: 50ms

            # 2. Sync Fan State (ON full speed)
            - fan.turn_on:
                id: lueftung_fan
                speed: 100

            # 3. Hold for 20s
            - delay: 20s

            # 4. Ramp Down 100% -> 0% in 5s
            - repeat:
                count: 100
                then:
                  - output.set_level:
                      id: fan_pwm_primary
                      level: !lambda |-
                        return calculate_ramp_down(iteration);
                  - delay: 50ms

            # 5. Sync Fan State (OFF)
            - fan.turn_off: lueftung_fan

            # 6. Pause before next cycle
            - delay: 100ms

  # LED Logic Handler
  - id: update_leds
    mode: restart
    then:
      - lambda: |-
          update_leds_logic();

  # Unified Fan Speed and Direction Control
  - id: set_fan_speed_and_direction
    parameters:
      speed: float # 0.0-1.0 (duty cycle)
      direction: int # 0 = Direction A, 1 = Direction B
    then:
      - lambda: |-
          std::string mode = id(fan_mode_select).current_option();

          if (mode == "4-Pin PWM") {
            // 4-Pin Mode (AxiRev): Use PWM duty cycle for speed AND direction
            // AxiRev Specification:
            // - 0-49% Duty: Direction A (intake), speed increases with PWM
            // - 50% Duty: Neutral (stopped)
            // - 51-100% Duty: Direction B (exhaust), speed increases with PWM
            
            float axirev_duty;
            
            if (direction == 0) {
              // Direction A: Map speed to 0-49% range
              // speed 0.0 -> 0%, speed 1.0 -> 49%
              axirev_duty = speed * 0.49f;
            } else {
              // Direction B: Map speed to 51-100% range
              // speed 0.0 -> 51%, speed 1.0 -> 100%
              axirev_duty = 0.51f + (speed * 0.49f);
            }
            
            id(fan_pwm_primary).set_level(axirev_duty);
            id(fan_pwm_secondary).set_level(0.0);  // Ensure GND2 is OFF
            
          } else if (mode == "3-Pin Dual-GND") {
            // 3-Pin Dual-GND Mode: Switch between GND1 and GND2
            
            // Map speed to VarioPro voltage range (7V-12V = 58%-100%)
            float variopro_duty = 0.58f + speed * 0.42f;
            
            if (direction == 0) {
              // Direction A: Activate GND1, deactivate GND2
              id(fan_pwm_secondary).set_level(0.0);
              delayMicroseconds(100);  // 100µs safety delay for MOSFET switching
              id(fan_pwm_primary).set_level(variopro_duty);
            } else {
              // Direction B: Activate GND2, deactivate GND1
              id(fan_pwm_primary).set_level(0.0);
              delayMicroseconds(100);  // 100µs safety delay for MOSFET switching
              id(fan_pwm_secondary).set_level(variopro_duty);
            }
          }

  # Fan Speed Update (called when intensity or mode changes)
  - id: fan_speed_update
    mode: restart
    then:
      - lambda: |-
          int intensity = id(fan_intensity_level);

          // Convert intensity (1-10) to speed (0.0-1.0)
          float speed = (intensity - 1) / 9.0f;  // 1->0.0, 10->1.0
          if (speed < 0.0f) speed = 0.0f;
          if (speed > 1.0f) speed = 1.0f;

          // Get direction from fan_direction switch
          int direction = id(fan_direction).state ? 1 : 0;

          // Apply speed and direction
          id(set_fan_speed_and_direction).execute(speed, direction);

# ---------------------------------------------------------
# CONTROL PANEL BUTTONS (Input)
# ---------------------------------------------------------
binary_sensor:
  # Button Mode (Right) - Mode Control (D9 / GPIO20)
  - platform: gpio
    pin:
      number: GPIO20
      mode:
        input: true
        # Internal Pullup removed (External 10k used)
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Mode"
    id: button_mode
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      then:
        - lambda: |-
            handle_button_mode_click();

  # Button Power (Left) - On/Off (D8 / GPIO19)
  - platform: gpio
    pin:
      number: GPIO19
      mode:
        input: true
        # Internal Pullup removed (External 10k used)
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Power"
    id: button_power
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      then:
        - lambda: |-
            handle_button_power_click();

  # Button Level (Middle) - Speed Level (D10 / GPIO18)
  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        # Internal Pullup removed (External 10k used)
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Fan Intensity"
    id: button_level
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_multi_click:
      # Short press: Cycle through intensity levels 1→10→1
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.1s
        then:
          - lambda: |-
              handle_button_level_click();
      # Long press (≥1s): Toggle system power
      - timing:
          - ON for at least 1s
        then:
          - lambda: handle_button_power_click();

# ---------------------------------------------------------
# VENTILATION CONTROL
# ---------------------------------------------------------

# Interval to check for pending broadcasts
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return ((esphome::VentilationController*)id(ventilation_ctrl))->pending_broadcast;"
          then:
            - espnow.send:
                address: "FF:FF:FF:FF:FF:FF"
                data: !lambda |-
                  return ((esphome::VentilationController*)id(ventilation_ctrl))->build_packet(esphome::MSG_SYNC);
