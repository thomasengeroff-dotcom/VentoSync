# File:        ventosync_radar_only.yaml
# Description: ESPHome configuration variant for devices with LD2450 radar sensor only.
#              Controls fan, clusters via ESP-NOW, and integrates with HA.
# Author:      Thomas Engeroff
# Created:     2026-04-21
# Modified:    2026-04-21
# ==========================================================================

substitutions:
  hide_climate_sensors: "true"
  firmware_variant: "ventosync-radar-only"

esphome:
  platformio_options:
    build_flags:
      - "-DVENTOSYNC_NO_SCD41"
      - "-DVENTOSYNC_NO_BME680"

packages:
  base: !include packages/base/ventosync_base.yaml
  mock_scd41: !include packages/sensors/mock_scd41.yaml
  mock_bme680: !include packages/sensors/mock_bme680.yaml
  ld2450: !include packages/sensors/sensor_LD2450.yaml
