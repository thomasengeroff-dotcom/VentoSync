output:
  # --- Fan PWM (Standard Output) ---
  - platform: ledc
    pin: GPIO19 # Pin D8
    frequency: 2000Hz # required by specification of EBM-Papst fan
    id: fan_pwm_primary
    inverted:
      true # Compensates for hardware inversion by PMV16XNR MOSFET:
      # ESP 100% → MOSFET ON → GND → Fan sees 0%; so we invert here.
    # min_power: 0%
    # (zero_means_zero is OMITTED here intentionally because for this bidirectional
    # driver, 0% is actually full power reverse, and 50% is motor stop!)

sensor:
  # Fan Tachometer (RPM) Reading (Hardware)
  - platform: pulse_counter
    pin: GPIO20 # Pin D9
    id: fan_rpm_pulse
    internal: true
    use_pcnt: true # Use hardware PCNT for efficient pulse counting (recommended for ESP32)
    update_interval: 1s # 1s Window for stable RPM calculation
    filters:
      - multiply: 0.5 # 2 pulses per revolution -> divide by 2

  # Fan RPM (Virtual / Calculated)
  # Uses real RPM if pulse_counter > 0, otherwise calculates based on speed demand.
  # 100% speed (level 10) = 4200 RPM
  - platform: template
    name: "Lüfter Drehzahl"
    id: fan_rpm
    unit_of_measurement: "RPM"
    state_class: "measurement"
    accuracy_decimals: 0
    icon: "mdi:speedometer"
    update_interval: 2s
    # No delta filter to ensure frequent visibility in logs when monitoring
    lambda: |-
      return calculate_virtual_fan_rpm(id(fan_rpm_pulse).state);
    on_value:
      then:
        - script.execute: update_leds # Update LEDs on RPM change (optional feedback)

  # Fan PWM Sensor (Diagnostic)
  # Shows the logical PWM value (0–100%) used when calling set_level() in the code.
  # This value represents what the fan actually receives (Software-inverted + MOSFET-inverted = original).
  # 50% = Stop, 0–49% = Direction A, 51–100% = Direction B
  - platform: template
    name: "Lüfter PWM"
    id: fan_pwm_percent
    unit_of_measurement: "%"
    state_class: "measurement"
    accuracy_decimals: 1
    icon: "mdi:fan-speed-1"
    update_interval: 2s
    lambda: |-
      return last_fan_pwm_level * 100.0f;
    filters:
      - delta: 0.5 # Only send if change > 0.5% (reduces HA traffic & CPU)

fan:
  - platform: speed
    output: fan_pwm_primary
    name: "Lüfter"
    id: lueftung_fan
    internal: true
    speed_count: 100 # 1-100% Granularity