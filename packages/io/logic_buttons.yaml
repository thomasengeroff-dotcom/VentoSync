# ---------------------------------------------------------
# CONTROL PANEL BUTTONS (Input via MCP23017 I/O Expander)
# ---------------------------------------------------------
binary_sensor:
  # Button Power (right) - On/Off (MCP23017 GPA0)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 0 # GPA0
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Power"
    internal: true # not needed in HA
    id: button_power
    # ⚡ SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms  # Ignores bouncing shorter than 25ms
      - delayed_off: 25ms # Prevents ghost presses on release
    on_click:
      # Short press: Toggle system on/off
      - min_length: 50ms
        max_length: 4999ms
        then:
          - lambda: "handle_button_power_short_click();"
      # Long press (5-10s): Power off with feedback
      - min_length: 5000ms
        max_length: 9999ms
        then:
          - lambda: "handle_button_power_long_click();"
      # Very long press (10-60s): Force restart (recovery)
      - min_length: 10000ms
        max_length: 60000ms
        then:
          - lambda: "handle_button_power_long_click();"
          - button.press: force_restart_button

  # Button Mode (left) - Mode Control (MCP23017 GPA1)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 1 # GPA1
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Mode"
    internal: true # not needed in HA
    id: button_mode
    # ⚡ SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      then:
        - lambda: "handle_button_mode_click();"
    # Child lock combo: hold Mode for 5s
    on_press:
      - script.execute: child_lock_handler
    on_release:
      - script.stop: child_lock_handler

  # Button Level (Middle) - Speed Level (MCP23017 GPA2)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 2 # GPA2
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Fan Intensity"
    internal: true # not needed in HA
    id: button_level
    # ⚡ SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms
      - delayed_off: 25ms
    on_click:
      # Short press: Cycle through intensity levels 1→10→1
      - min_length: 50ms
        max_length: 749ms # Shorter than hold handler delay (750ms)
        then:
          - lambda: "handle_button_level_click();"
    # Hold: Continuous intensity ramp (bounce 1↔10)
    on_press:
      - script.execute: intensity_hold_handler
    on_release:
      - script.stop: intensity_hold_handler
      - lambda: "sync_settings_to_peers();"

# ---------------------------------------------------------
# CHILD LOCK SCRIPTS
# ---------------------------------------------------------
script:
  # --- Combo Handler: hold Mode for 5 seconds to toggle child lock ---
  # Uses nested if-delay-if pattern to verify continuous button hold.
  # Total hold time: 500ms + 4×1s = 4.5s (fires at ~5s mark).
  # The child_lock_combo_triggered_ms timestamp suppresses the stale
  # mode-change event that fires on button release.
  - id: child_lock_handler
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            lambda: "return id(button_mode).state;"
          then:
            - delay: 1s
            - if:
                condition:
                  lambda: "return id(button_mode).state;"
                then:
                  - delay: 1s
                  - if:
                      condition:
                        lambda: "return id(button_mode).state;"
                      then:
                        - delay: 1s
                        - if:
                            condition:
                              lambda: "return id(button_mode).state;"
                            then:
                              - delay: 1s
                              - if:
                                  condition:
                                    lambda: "return id(button_mode).state;"
                                  then:
                                    # 4.5s confirmed hold — toggle child lock!
                                    - lambda: "toggle_child_lock();"
                                    - script.execute: flash_leds_child_lock_2x

  # --- LED Flash: 3x for child lock REJECT ---
  # Called when a button is pressed while child lock is active.
  # Fast triple blink = "access denied" visual feedback.
  # Uses YAML delay (non-blocking) so PCA9685 I2C writes flush.
  - id: flash_leds_child_lock_3x
    mode: restart
    then:
      - repeat:
          count: 3
          then:
            - lambda: "flash_all_leds_on();"
            - delay: 150ms
            - lambda: "led_guard::turn_off_all_leds();"
            - delay: 200ms
      - lambda: "restore_leds_after_flash();"

  # --- LED Flash: 2x for child lock TOGGLE ACK ---
  # Called when the 5s Mode-hold combo successfully toggles the lock.
  # Slower double blink = "action confirmed" visual feedback.
  - id: flash_leds_child_lock_2x
    mode: restart
    then:
      - repeat:
          count: 2
          then:
            - lambda: "flash_all_leds_on();"
            - delay: 200ms
            - lambda: "led_guard::turn_off_all_leds();"
            - delay: 300ms
      - lambda: "restore_leds_after_flash();"
