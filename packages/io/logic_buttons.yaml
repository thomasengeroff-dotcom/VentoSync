# File:        logic_buttons.yaml
# Description: Configuration and logic for the physical control panel
#              buttons (MCP23017 I/O Expander). Handles Power, Mode,
#              and Intensity buttons with debouncing, click detection,
#              child lock combo, and LED flash feedback.
# Author:      Thomas Engeroff
# Created:     2026-04-21
# Modified:    2026-05-16
