# ---------------------------------------------------------
# UI CONTROLS (Home Assistant)
# ---------------------------------------------------------
number:
  - platform: template
    name: "Durchlüften Dauer (min)"
    id: vent_timer
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            set_ventilation_timer(x);

  - platform: template
    name: "Sync Intervall"
    id: sync_interval_config
    icon: "mdi:sync"
    unit_of_measurement: "min"
    min_value: 1
    max_value: 360 # 6 hours
    step: 10
    initial_value: 180 # 3 hours
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            set_sync_interval_handler(x);

  - platform: template
    name: "Lüfter Intensität"
    id: fan_intensity_display
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    #restore_value: true
    optimistic: false
    #initial_value: 1
    lambda: |-
      return id(fan_intensity_level);
    set_action:
      then:
        - lambda: |-
            set_fan_intensity_slider(x);

  - platform: template
    name: "Maximale LED Helligkeit"
    id: led_max_brightness_config
    icon: "mdi:brightness-6"
    unit_of_measurement: "%"
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 80
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(max_led_brightness) = x / 100.0f;
            id(update_leds).execute();
            sync_settings_to_peers();
            ESP_LOGI("ui", "Max LED brightness set to %.2f", id(max_led_brightness));

  # Auto Mode: Min Fan Level (moisture protection)
  - platform: template
    name: "Smart-Automatik Min Lüfterstufe"
    id: automatik_min_luefterstufe
    icon: "mdi:water-percent"
    min_value: 1
    max_value: 3
    step: 1
    mode: slider
    optimistic: true
    initial_value: 2
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(automatik_min_fan_level) = (int)x;
            sync_settings_to_peers();
            ESP_LOGI("co2_auto", "Min fan level set to %d", (int)x);

  # Auto Mode: Max Fan Level (noise limiter)
  - platform: template
    name: "Smart-Automatik Max Lüfterstufe"
    id: automatik_max_luefterstufe
    icon: "mdi:volume-off"
    min_value: 5
    max_value: 10
    step: 1
    mode: slider
    optimistic: true
    initial_value: 7
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(automatik_max_fan_level) = (int)x;
            sync_settings_to_peers();
            ESP_LOGI("co2_auto", "Max fan level set to %d", (int)x);

  # Auto Mode CO2 Threshold
  - platform: template
    name: "Smart-Automatik: CO2 Grenzwert"
    id: auto_co2_threshold
    icon: "mdi:molecule-co2"
    min_value: 400
    max_value: 2000
    step: 50
    unit_of_measurement: "ppm"
    lambda: "return id(auto_co2_threshold_val);"
    set_action:
      - lambda: |-
          id(auto_co2_threshold_val) = (int)x;
          id(auto_co2_threshold).publish_state(x);
          auto call = id(pid_co2).make_call();
          call.set_target_temperature(x);
          call.perform();
          sync_settings_to_peers();

  # Auto Mode Humidity Threshold
  - platform: template
    name: "Smart-Automatik: Feuchte Grenzwert"
    id: auto_humidity_threshold
    icon: "mdi:water-percent"
    min_value: 40
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    lambda: "return id(auto_humidity_threshold_val);"
    set_action:
      - lambda: |-
          id(auto_humidity_threshold_val) = (int)x;
          id(auto_humidity_threshold).publish_state(x);
          auto call = id(pid_humidity).make_call();
          call.set_target_temperature(x);
          call.perform();
          sync_settings_to_peers();

  # -- Presence (Radar) Slider Behavior --
  - platform: template
    name: "Radar Lüfter-Anpassung"
    id: auto_presence_slider
    icon: mdi:fan-auto
    min_value: -5
    max_value: 5
    step: 1
    entity_category: config
    lambda: "return id(auto_presence_val);"
    set_action:
      - lambda: |-
          id(auto_presence_val) = x;
          id(auto_presence_slider).publish_state(x);
          sync_settings_to_peers();
          evaluate_auto_mode(); // Force re-eval

  # Auto Mode: Summer Cooling Indoor Temperature Threshold
  - platform: template
    name: "Smart-Automatik: Sommerkühlung Schwelle"
    id: auto_summer_cooling_threshold
    icon: "mdi:thermometer-alert"
    unit_of_measurement: "°C"
    min_value: 18
    max_value: 30
    step: 1
    entity_category: config
    lambda: "return id(summer_cooling_threshold);"
    set_action:
      - lambda: |-
          id(summer_cooling_threshold) = (int)x;
          id(auto_summer_cooling_threshold).publish_state(x);
          ESP_LOGI("auto_mode", "Sommerkühlung Schwelle auf %d°C gesetzt", (int)x);

# ---------------------------------------------------------
# TEXT SENSORS (Status Display)
# ---------------------------------------------------------
text_sensor:
  - platform: template
    name: "Lüfter Richtung"
    id: direction_display
    icon: "mdi:directions-fork"
    lambda: |-
      static std::string last_state = "";
      std::string current_state = "";
      
      if (last_fan_pwm_level < 0.45f) {
        current_state = "Abluft (Raus)";
      } else if (last_fan_pwm_level > 0.55f) {
        current_state = "Zuluft (Rein)";
      } else {
        current_state = "Stillstand";
      }

      if (current_state == last_state) return {};
      last_state = current_state;
      return {current_state};

  - platform: template
    name: "Fenstersperre Aktiv"
    id: window_guard_status
    icon: "mdi:window-open-variant"
    lambda: |-
      if (((esphome::VentilationController*)id(ventilation_ctrl))->is_window_guard_active()) {
        return {"Ja"};
      } else {
        return {"Nein"};
      }
    update_interval: 10s

# ---------------------------------------------------------
# VENTILATION MODE SELECTION
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Fenstersperre ignorieren"
    id: ignore_window_guard_switch
    icon: "mdi:window-open-variant"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(ventilation_ctrl)->set_ignore_window_guard(true);
    turn_off_action:
      - lambda: |-
          id(ventilation_ctrl)->set_ignore_window_guard(false);

select:
  # Ventilation Mode
  - platform: template
    name: "Lüftermodus"
    id: luefter_modus
    options:
      - "Smart-Automatik"
      - "Wärmerückgewinnung"
      - "Durchlüften"
      - "Stoßlüftung"
      - "Aus"
    initial_option: "Smart-Automatik"
    set_action:
      - lambda: |-
          set_operating_mode_select(x); // W5: pass std::string directly, not c_str()

button:
  - platform: restart
    name: "ESP Neustart erzwingen"
    id: force_restart_button
    entity_category: config

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # LED Logic Handler
  - id: update_leds
    mode: restart
    then:
      - lambda: |-
          update_leds_logic();
  # Auto-Dimming UI Timer (30s)
  - id: ui_timeout_script
    mode: restart
    then:
      - globals.set:
          id: ui_active
          value: "true"
      - script.execute: update_leds
      - delay: 30s
      - globals.set:
          id: ui_active
          value: "false"
      - script.execute: update_leds