# File:        sensor_NTC.yaml
# Description: Configuration for interior (Abluft) and exterior (Zuluft)
#              analog NTC temperature sensors with phase-aware filtering.
# Author:      Thomas Engeroff
# Created:     2025-03-05
# Modified:    2025-06-XX
