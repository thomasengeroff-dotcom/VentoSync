# File:        sensor_LD2450.yaml
# Description: Configuration for sensor HLK-LD2450 RADAR SENSOR
#              Includes: Presence, Target Count, Moving/Still detection
#              The UART is defined in hardware_io.yaml (id: uart_ld2450)
# Author:      Thomas Engeroff
# Created:     2026-03-28
# Modified:    2026-04-21
# ==========================================================================

ld2450:
  - id: ld2450_radar
    uart_id: uart_ld2450

sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Radar Anzahl Ziele"

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Radar Anwesenheit"
      id: radar_presence
    has_moving_target:
      name: "Radar Bewegung"
    has_still_target:
      name: "Radar Stillstand"
