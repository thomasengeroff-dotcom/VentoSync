# ---------------------------------------------------------
# SENSORS CONFIGURATION
# ---------------------------------------------------------

sensor:

  # ---------------------------------------------------------
  # HEAT RECOVERY EFFICIENCY CALCULATION
  # ---------------------------------------------------------
  # Calculates the efficiency of heat recovery based on temperature difference
  # Formula: Efficiency = (T_zuluft - T_außen) / (T_raum - T_außen) * 100%
  - platform: template
    name: "WRG Effizienz"
    id: heat_recovery_efficiency
    internal: ${hide_climate_sensors}
    unit_of_measurement: "%"
    state_class: "measurement"
    accuracy_decimals: 1
    icon: "mdi:percent"
    update_interval: 60s
    lambda: |-
      float t_in = id(scd41_temperature).state;
      if (std::isnan(t_in)) t_in = id(bme680_temperature).state;

      // Abort calculation if no valid room temperature is available
      if (std::isnan(t_in)) return NAN;

      return calculate_heat_recovery_efficiency(
        t_in,                         // Room temperature (SCD41 or BME680 only!)
        id(temp_zuluft).state,        // Supply air temperature
        id(temp_abluft).state,        // Exhaust air temperature
        id(heat_recovery_efficiency).state
      );

  # ---------------------------------------------------------
  # EFFECTIVE CO2 SENSOR (Unified Fallback)
  # ---------------------------------------------------------
  - platform: template
    name: "Effektiver CO2 Wert"
    id: effective_co2
    internal: ${hide_climate_sensors}
    unit_of_measurement: "ppm"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    icon: "mdi:molecule-co2"
    update_interval: 30s
    lambda: |-
      static uint32_t last_valid_sensor_ms = millis();
      if (!std::isnan(id(scd41_co2).state)) {
        last_valid_sensor_ms = millis();
        return id(scd41_co2).state;
      }
      if (!std::isnan(id(iaq_co2eq).state)) {
        last_valid_sensor_ms = millis();
        return id(iaq_co2eq).state;
      }
      // Both sensors NaN — hold last value for up to 5 minutes, then publish NaN
      // to signal PID that input is stale. Auto mode handles NaN gracefully.
      if (millis() - last_valid_sensor_ms > 300000) {
        ESP_LOGW("co2", "CO2 staleness timeout (>5min). Publishing NaN.");
        return NAN;
      }
      return id(effective_co2).state;

# ---------------------------------------------------------
# TEXT SENSORS (Status & Classification)
# ---------------------------------------------------------
text_sensor:
  # Human-readable CO2 classification based on effective value
  - platform: template
    name: "CO2 Bewertung"
    id: effective_co2_bewertung
    internal: ${hide_climate_sensors}
    icon: "mdi:circle-slice-8"
    update_interval: 60s
    lambda: |-
      return get_co2_classification(id(effective_co2).state);

  # Human-readable info about which sensor is used for WRG efficiency
  - platform: template
    name: "WRG Referenz-Messpunkt"
    id: wrg_reference_sensor
    internal: ${hide_climate_sensors}
    icon: "mdi:target-variant"
    update_interval: 60s
    lambda: |-
      if (!std::isnan(id(scd41_temperature).state)) return std::string("SCD41");
      if (!std::isnan(id(bme680_temperature).state)) return std::string("BME680");
      return std::string("Kein Raumsensor");

