sensor:
  # BMP390 Environmental Data (Temperature & Pressure)
  - platform: bmp3xx_i2c
    temperature:
      name: "BMP390 Temperatur"
      id: temperature
      accuracy_decimals: 1
      oversampling: 16x
      filters:
        - median:
            window_size: 5
            send_every: 5

    pressure:
      name: "BMP390 Luftdruck"
      id: pressure
      accuracy_decimals: 1
      oversampling: 16x
    address: 0x76
    update_interval: 60s
    iir_filter: 2x
