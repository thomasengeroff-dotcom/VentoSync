# ==========================================================================
# VentoSync HRV – ESPHome Mock Configuration for missing climate sensors
# ==========================================================================
sensor:
  - platform: template
    id: scd41_co2
    name: "SCD41 CO2 (Mock)"
    unit_of_measurement: "ppm"
    internal: true
    lambda: 'return NAN;'
    
  - platform: template
    id: scd41_temperature
    name: "SCD41 Temperatur (Mock)"
    unit_of_measurement: "°C"
    internal: true
    lambda: 'return NAN;'
    
  - platform: template
    id: scd41_humidity
    name: "SCD41 Luftfeuchtigkeit (Mock)"
    unit_of_measurement: "%"
    internal: true
    lambda: 'return NAN;'
    
  - platform: template
    id: bme680_temperature
    name: "BME680 Temperatur (Mock)"
    unit_of_measurement: "°C"
    internal: true
    lambda: 'return NAN;'
    
  - platform: template
    id: bme680_humidity
    name: "BME680 Luftfeuchtigkeit (Mock)"
    unit_of_measurement: "%"
    internal: true
    lambda: 'return NAN;'
    
  - platform: template
    id: iaq_co2eq
    name: "BME680 IAQ CO2eq (Mock)"
    unit_of_measurement: "ppm"
    internal: true
    lambda: 'return NAN;'
