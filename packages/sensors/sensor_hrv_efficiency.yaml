# ==========================================================================
# VentoSync HRV – Heat Recovery Efficiency Sensor
# File: sensor_hrv_efficiency.yaml
# ==========================================================================


sensor:
  # ---------------------------------------------------------
  # WRG-Effizienz: Energiebasierte Zykluseffizienz
  # Updated at end of each Zuluft cycle via finalize_cycle()
  # ---------------------------------------------------------
  - platform: template
    name: "WRG Effizienz (Zyklus)"
    id: hrv_efficiency_cycle
    internal: ${hide_ntc_sensors}
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:heat-wave"
    device_class: power_factor
    state_class: measurement
    update_interval: never  # Updated programmatically

  # ---------------------------------------------------------
  # WRG-Effizienz: Live-Schätzung während laufender Phase
  # ---------------------------------------------------------
  - platform: template
    name: "WRG Effizienz"
    id: heat_recovery_efficiency
    internal: ${hide_ntc_sensors}
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:heat-wave"
    state_class: measurement
    update_interval: 10s
    lambda: |-
      float eta = ventosync::hrv::get_calculator().get_live_efficiency();
      if (std::isnan(eta)) return {};
      return eta;

  # ---------------------------------------------------------
  # Rückgewonnene Energie pro Zyklus
  # ---------------------------------------------------------
  - platform: template
    name: "WRG Energie (Zyklus)"
    id: hrv_energy_cycle
    internal: ${hide_ntc_sensors}
    unit_of_measurement: "Wh"
    accuracy_decimals: 2
    icon: "mdi:lightning-bolt"
    state_class: measurement
    update_interval: never

interval:
  # ---------------------------------------------------------
  # Sample-Collector: Speist NTC-Daten in den Integrator
  # Läuft synchron zum NTC update_interval (5s)
  # ---------------------------------------------------------
  - interval: 5s
    then:
      - lambda: |-
          if (id(ventilation_ctrl) == nullptr) return;
          
          auto hw = id(ventilation_ctrl)->state_machine.get_target_state(millis());
          bool is_supply = hw.direction_in;
          
          // Phase tracking: Detect transition from Supply -> Exhaust
          static bool last_was_supply = false;
          
          if (last_was_supply && !is_supply) {
            // Zuluft-Phase ist gerade beendet → Zyklus finalisieren
            // Estimate volume flow based on manufacturer data for Ventomaxx v-wrg-1
            // Mapping 10 custom levels to the 5 original stages (17, 21, 24, 34, 43 m³/h)
            float flow_m3h = 0.0f;
            if (id(ventilation_ctrl) != nullptr) {
              int level = id(ventilation_ctrl)->current_fan_intensity;
              switch (level) {
                case 1:  flow_m3h = 17.0f; break;
                case 2:  flow_m3h = 18.0f; break;
                case 3:  flow_m3h = 20.0f; break;
                case 4:  flow_m3h = 21.0f; break;
                case 5:  flow_m3h = 22.5f; break;
                case 6:  flow_m3h = 24.0f; break;
                case 7:  flow_m3h = 29.0f; break;
                case 8:  flow_m3h = 34.0f; break;
                case 9:  flow_m3h = 38.5f; break;
                case 10: flow_m3h = 43.0f; break;
                default: flow_m3h = 0.0f;  break;
              }
            }
            auto result = ventosync::hrv::get_calculator().finalize_cycle(flow_m3h);
            
            if (result.valid) {
              id(hrv_efficiency_cycle).publish_state(result.efficiency_pct);
              id(hrv_energy_cycle).publish_state(result.energy_recovered_wh);
              
              ESP_LOGI("hrv", "Cycle efficiency: %.1f%% | Duration: %.0fs | Samples: %d",
                       result.efficiency_pct, result.cycle_duration_s,
                       ventosync::hrv::get_calculator().get_sample_count());
            } else {
              ESP_LOGD("hrv", "Cycle result invalid (samples=%d, duration=%.0fs)",
                       ventosync::hrv::get_calculator().get_sample_count(), result.cycle_duration_s);
            }
          } else if (!last_was_supply && is_supply) {
            // Abluft -> Zuluft (New cycle starting)
            ventosync::hrv::get_calculator().reset();
          }
          last_was_supply = is_supply;
          
          // Nur während der Zuluft-Phase (Luft wird von außen reingeblasen) integrieren
          if (!is_supply) return;
          
          float t_supply  = id(temp_abluft_raw).state; // Luft nach Keramik (was im Raum ankommt, RAW weil ungefiltert in dieser Phase)
          float t_extract = id(temp_abluft).state;     // Raumluft (Referenz, gefiltert und gehalten)
          float t_outside = id(temp_zuluft).state;     // Außentemperatur (Referenz, gefiltert)
          
          ventosync::hrv::get_calculator().add_sample(
            t_supply, t_extract, t_outside,
            millis()
          );
