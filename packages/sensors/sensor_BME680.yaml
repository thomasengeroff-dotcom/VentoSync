# File:        sensor_BME680.yaml
# Description: Configuration for sensor BME680 SENSOR COMPLETE
#              Includes: IAQ, Dewpoint, Absolute Pressure, Trend,
#                        Baseline Persistence, Sensor Status
#              Requirements:
#                - I2C Bus "bus_a" must be configured
#                - 48h Burn-in for stable gas values
#                - Adjust location altitude in "ALTITUDE"
# Author:      Thomas Engeroff
# Created:     2026-03-28
# Modified:    2026-04-21
