# ==========================================================================
# VentoSync HRV – BME680 IAQ (Engine-backed)
# ==========================================================================

globals:
  - id: saved_baseline
    type: float
    restore_value: true
    initial_value: "0.0"
  - id: saved_burn_in
    type: int
    restore_value: true
    initial_value: "0"
  - id: iaq_engine_ptr
    type: void*
    restore_value: false
    initial_value: "nullptr"

esphome:
  includes:
    - include/bme680_iaq_engine.h
  on_boot:
    priority: 200
    then:
      - lambda: |-
          static ventosync::BME680IAQEngine engine;
          // Make accessible globally via a pointer stored in a global
          id(iaq_engine_ptr) = (void*)&engine;
          engine.restore(id(saved_baseline), id(saved_burn_in));


sensor:
  # ── Hardware ──────────────────────────────────────────
  - platform: bme680
    i2c_id: bus_a
    address: 0x77
    update_interval: 30s
    # Optimized heater profile for IAQ in residential environment
    # Lower temp = less self-heating, less power, longer heater life
    # 300°C/150ms is the Bosch recommendation for IAQ applications
    heater:
      temperature: 300    # °C (default 320) – reduces self-heating
      duration: 150ms     # Heater on-time (default 150ms) – good balance
    temperature:
      name: "BME680 Temperatur (Rohwert)"
      id: bme680_temperature_raw
      oversampling: 8x
      internal: true
    pressure:
      name: "BME680 Luftdruck (Absolut)"
      id: bme680_pressure_absolute
      oversampling: 4x
      internal: true
    humidity:
      name: "BME680 Luftfeuchtigkeit"
      id: bme680_humidity
      oversampling: 8x
      filters:
        - clamp:
            min_value: 0
            max_value: 100
    gas_resistance:
      name: "BME680 Gaswiderstand"
      id: gas_resistance
      filters:
        - clamp:
            min_value: 0
            max_value: 1000000

  # ── Temperature (dynamic offset) ─────────────────────
  - platform: template
    name: "BME680 Temperatur"
    id: bme680_temperature
    icon: "mdi:thermometer"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    state_class: "measurement"
    update_interval: 30s
    lambda: |-
      float temp = id(bme680_temperature_raw).state;
      if (std::isnan(temp)) return NAN;
      float offset = (temp > 30.0f) ? -1.0f
                   : (temp < 10.0f) ? -2.0f
                   : -2.0f + (temp - 10.0f) / 20.0f;
      return temp + offset;

  # ── Relative pressure (sea-level corrected) ──────────
  - platform: template
    name: "BME680 Luftdruck (Relativ)"
    id: bme680_pressure_relative
    icon: "mdi:gauge"
    unit_of_measurement: "hPa"
    accuracy_decimals: 1
    device_class: "atmospheric_pressure"
    state_class: "measurement"
    update_interval: 30s
    lambda: |-
      static const float ALTITUDE = 250.0f;
      float p = id(bme680_pressure_absolute).state;
      float t = id(bme680_temperature).state;
      if (std::isnan(p) || std::isnan(t)) return NAN;
      return p * powf(1.0f - (0.0065f * ALTITUDE / (t + 273.15f + 0.0065f * ALTITUDE)), -5.25588f);

  # ── Dew point (Magnus) ──────────────────────────────
  - platform: template
    name: "BME680 Taupunkt"
    id: bme680_dewpoint
    icon: "mdi:water-thermometer"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: "temperature"
    state_class: "measurement"
    update_interval: 30s
    lambda: |-
      static const float A = 17.271f, B = 237.7f;
      float t = id(bme680_temperature).state;
      float h = id(bme680_humidity).state;
      if (std::isnan(t) || std::isnan(h) || h <= 0.0f) return NAN;
      float alpha = (A * t / (B + t)) + logf(h / 100.0f);
      return (B * alpha) / (A - alpha);

  # ── Absolute humidity ────────────────────────────────
  - platform: template
    name: "BME680 Absolute Feuchtigkeit"
    id: bme680_abs_humidity
    icon: "mdi:water"
    unit_of_measurement: "g/m³"
    accuracy_decimals: 1
    state_class: "measurement"
    update_interval: 30s
    lambda: |-
      float t = id(bme680_temperature).state;
      float h = id(bme680_humidity).state;
      if (std::isnan(t) || std::isnan(h)) return NAN;
      float es = 6.112f * expf(17.67f * t / (t + 243.5f));
      return (es * h / 100.0f * 2.1674f) / (t + 273.15f);

  # ── IAQ Engine output sensors ────────────────────────
  - platform: template
    name: "BME680 Gas-Basiswert"
    id: gas_baseline
    icon: "mdi:chart-line"
    unit_of_measurement: "Ω"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      auto *engine = (ventosync::BME680IAQEngine*)id(iaq_engine_ptr);
      if (!engine) return NAN;
      ventosync::IAQResult result;
      bool should_save = engine->update(
        id(gas_resistance).state,
        id(bme680_humidity).state,
        result
      );
      // Propagate results to dependent sensors
      id(iaq_co2eq).publish_state(result.co2eq_ppm);
      id(iaq_trend).publish_state(result.trend_ppm_min);
      id(iaq_level).publish_state(result.level);
      id(iaq_trend_direction).publish_state(result.trend_dir);
      id(bme680_status).publish_state(engine->get_status());
      id(bme680_health).publish_state(!result.healthy);
      // Persist to flash if engine recommends
      if (should_save) {
        id(saved_baseline) = result.baseline_ohm;
        id(saved_burn_in) = engine->get_burn_in_minutes();
        ESP_LOGD("bme680", "Flash save: baseline=%.0f burn_in=%d",
                 result.baseline_ohm, engine->get_burn_in_minutes());
      }
      return result.baseline_ohm;

  - platform: template
    name: "BME680 Luftqualität (CO2eq)"
    id: iaq_co2eq
    icon: "mdi:molecule-co2"
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    device_class: "carbon_dioxide"
    state_class: "measurement"
    update_interval: never  # Driven by gas_baseline

  - platform: template
    name: "BME680 IAQ Trend"
    id: iaq_trend
    icon: "mdi:trending-up"
    unit_of_measurement: "ppm/min"
    accuracy_decimals: 0
    state_class: "measurement"
    update_interval: never  # Driven by gas_baseline

text_sensor:
  - platform: template
    name: "BME680 IAQ Bewertung"
    id: iaq_level
    icon: "mdi:air-filter"
    update_interval: never

  - platform: template
    name: "BME680 IAQ Trendrichtung"
    id: iaq_trend_direction
    icon: "mdi:swap-vertical"
    update_interval: never

  - platform: template
    name: "BME680 Sensor-Status"
    id: bme680_status
    icon: "mdi:information"
    update_interval: never

binary_sensor:
  - platform: template
    name: "BME680 Sensor Health"
    id: bme680_health
    device_class: problem
    icon: "mdi:heart-pulse"

button:
  - platform: template
    name: "BME680 Basiswert zurücksetzen"
    icon: "mdi:restart"
    entity_category: "config"
    on_press:
      then:
        - lambda: |-
            auto *engine = (ventosync::BME680IAQEngine*)id(iaq_engine_ptr);
            if (engine) engine->reset();
            id(saved_baseline) = 0.0f;
            id(saved_burn_in) = 0;
