# ---------------------------------------------------------
# GLOBALS
# ---------------------------------------------------------
globals:
  - id: intensity_bounce_up
    type: bool
    initial_value: "true" # Start by incrementing up to 10
    restore_value: no

  - id: watchdog_restarts_count
    type: int
    initial_value: '0'
    restore_value: yes

# ---------------------------------------------------------
# PID CLIMATE CONTROLLERS (Internal)
# ---------------------------------------------------------
climate:
  - platform: pid
    name: "PID CO2 Automatik"
    id: pid_co2
    sensor: effective_co2
    default_target_temperature: 1000 # Target CO2 in ppm
    cool_output: pid_co2_output # Output for fan speed
    internal: true
    control_parameters:
      # P-part: 0.002 means +20% fan power per 100ppm above target.
      kp: 0.002
      # I-part: Extremely low! (~1.8% more power per minute at 100ppm excess)
      ki: 0.000003
      kd: 0.0
      output_averaging_samples: 5
    deadband_parameters:
      # Narrow deadband for smooth ramp-down to 0%
      threshold_high: 10.0
      threshold_low: -10.0

  - platform: pid
    name: "PID Feuchte Automatik"
    id: pid_humidity
    sensor: scd41_humidity
    default_target_temperature: 60
    cool_output: pid_humidity_output
    internal: true
    control_parameters:
      # P-part: At 60% setpoint, kp:0.1 means at 65% rH it runs softly at 50%
      kp: 0.1
      # I-part: Also reduced significantly (approx. +3% power per minute at 5% residual humidity)
      ki: 0.0001
      kd: 0.0
      output_averaging_samples: 5
    deadband_parameters:
      threshold_high: 1.0
      threshold_low: -1.0

# ---------------------------------------------------------
# AUTOMATIONS & SWITCHES
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Lüfterrichtung"
    id: fan_direction
    internal: true
    optimistic: true
    turn_on_action:
      - lambda: |-
          notify_fan_direction_changed();
          id(fan_direction).publish_state(true);
      - script.execute: fan_speed_update
    turn_off_action:
      - lambda: |-
          notify_fan_direction_changed();
          id(fan_direction).publish_state(false);
      - script.execute: fan_speed_update

  # CO2-based adaptive fan control (on/off)
  - platform: template
    name: "Automatik CO2"
    id: automatik_co2
    icon: "mdi:molecule-co2"
    optimistic: false
    lambda: |-
      return id(co2_auto_enabled);
    turn_on_action:
      - lambda: |-
          if (std::isnan(id(effective_co2).state)) {
            ESP_LOGW("co2_auto", "No CO2 sensor available (SCD41/BME680) — CO2 Auto Mode cannot be enabled");
          } else {
            id(co2_auto_enabled) = true;
            // Activate PID controller (Intent: CO2 Reduction)
            auto call = id(pid_co2).make_call();
            call.set_mode(esphome::climate::CLIMATE_MODE_COOL); // CLIMATE_MODE_COOL is an ESPHome variable and cannot be renamed
            call.perform();
            sync_settings_to_peers();
            ESP_LOGI("co2_auto", "CO2 Auto Mode enabled");
          }
    turn_off_action:
      - lambda: |-
          id(co2_auto_enabled) = false;
          // Deactivate PID controller completely to stop logging and calculations
          auto call = id(pid_co2).make_call();
          call.set_mode(esphome::climate::CLIMATE_MODE_OFF);
          call.perform();
          sync_settings_to_peers();
          ESP_LOGI("co2_auto", "CO2 Auto Mode disabled");

  # ESP-NOW Peer Check (disable to suppress Master LED blinking without peers)
  - platform: template
    name: "ESP-NOW Peerprüfung"
    id: peer_check_switch
    icon: "mdi:access-point-network"
    optimistic: false
    lambda: |-
      return id(peer_check_enabled);
    turn_on_action:
      - lambda: |-
          id(peer_check_enabled) = true;
          sync_settings_to_peers();
          ESP_LOGI("espnow", "Peer check enabled");
    turn_off_action:
      - lambda: |-
          id(peer_check_enabled) = false;
          sync_settings_to_peers();
          ESP_LOGI("espnow", "Peer check disabled");

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # LED Logic Handler
  - id: update_leds
    mode: restart
    then:
      - lambda: |-
          update_leds_logic();

  # Auto-Dimming UI Timer (30s)
  - id: ui_timeout_script
    mode: restart
    then:
      - globals.set:
          id: ui_active
          value: "true"
      - script.execute: update_leds
      - delay: 30s
      - globals.set:
          id: ui_active
          value: "false"
      - script.execute: update_leds

  # Unified Fan Speed and Direction Control
  - id: set_fan_speed_and_direction
    parameters:
      speed: float # 0.0-1.0 (duty cycle)
      direction: int # 0 = Direction A, 1 = Direction B
    then:
      - lambda: |-
          set_fan_logic(speed, direction);

  # Fan Speed Update (called when intensity or mode changes)
  - id: fan_speed_update
    mode: restart
    then:
      - lambda: update_fan_logic();

  # --- Light Sleep Management ---
  # Reduces power by turning off WiFi and LEDs
  - id: system_sleep
    mode: restart  # Note: 'light_sleep' is not a valid execution mode for a script.
    then:
      - lambda: |-
          ESP_LOGI("sleep", "Entering Light Sleep Mode (WiFi OFF, LEDs OFF)");
      - switch.turn_off: pca9685_oe
      - wifi.disable:

  # Restores full operation
  - id: system_wakeup
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("sleep", "Waking up from Light Sleep (WiFi ON, LEDs ON)");
      - wifi.enable:
      - switch.turn_on: pca9685_oe

  # Intensity Hold Handler: every 1s, trigger the bounce logic in automation_helpers.h
  - id: intensity_hold_handler
    mode: restart
    then:
      - delay: 750ms # Wait slightly to distinguish from a short click
      - while:
          condition:
            lambda: return id(button_level).state;
          then:
            - lambda: handle_intensity_bounce();
            - delay: 500ms

  # ESP-NOW Discovery: Load peers from flash and send discovery broadcast
  # Called from the boot interval once ESP-NOW is fully ready
  - id: espnow_discovery
    mode: single
    then:
      - lambda: load_peers_from_runtime_cache(); # W4: renamed from load_peers_from_flash
      - lambda: send_discovery_broadcast();
      - delay: 2s
      - lambda: request_peer_status();

      # LED Self-Test and UI start (moved from boot to avoid bus contention)
      - delay: 500ms
      - lambda: run_led_self_test();
      - delay: 3s
      - script.execute: ui_timeout_script
      - script.execute: fan_speed_update

# ---------------------------------------------------------
# CONTROL PANEL BUTTONS (Input)
# ---------------------------------------------------------
binary_sensor:
  # Button Power (Left) - On/Off (MCP23017 GPA0)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 0 # GPA0
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Power"
    internal: true # not needed in HA
    id: button_power
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      - min_length: 50ms
        max_length: 4999ms
        then:
          - lambda: |-
              handle_button_power_short_click();
      - min_length: 5000ms
        max_length: 9999ms
        then:
          - lambda: |-
              handle_button_power_long_click();
      - min_length: 10000ms
        max_length: 60000ms
        then:
          - lambda: |-
              handle_button_power_long_click();
          - button.press: system_reboot
  # Button Mode (Right) - Mode Control (MCP23017 GPA1)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 1 # GPA1
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Mode"
    internal: true # not needed in HA
    id: button_mode
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      then:
        - lambda: |-
            handle_button_mode_click();

  # Button Level (Middle) - Speed Level (MCP23017 GPA2)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 2 # GPA2
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Fan Intensity"
    internal: true # not needed in HA
    id: button_level
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      # Short press: Cycle through intensity levels 1→10→1
      - min_length: 50ms
        max_length: 749ms # Slightly shorter than the hold handler delay
        then:
          - lambda: |-
              handle_button_level_click();
    on_press:
      - script.execute: intensity_hold_handler
    on_release:
      - script.stop: intensity_hold_handler
      - lambda: sync_settings_to_peers();

button:
  - platform: restart
    id: system_reboot
    name: "System Reboot"

esphome:
  on_boot:
    priority: -10 # Run after all components are initialized
    then:
      - lambda: |-
          #include <esp_system.h>
          // Detect Watchdog resets and increment counter
          esp_reset_reason_t reason = esp_reset_reason();
          if (reason == ESP_RST_WDT || reason == ESP_RST_TASK_WDT) {
            id(watchdog_restarts_count)++;
            ESP_LOGW("system", "WATCHDOG RESET DETECTED! Total: %d", id(watchdog_restarts_count));
          }
          id(watchdog_restarts).publish_state(id(watchdog_restarts_count));

# ---------------------------------------------------------
# VENTILATION CONTROL
# ---------------------------------------------------------

# Interval to check for pending broadcasts
interval:
  # Trigger ESP-NOW discovery and request peer status whenever WiFi connects.
  # This fires at boot AND when waking up from Light Sleep (Aus mode).
  - interval: 2s
    then:
      - if:
          condition:
            lambda: |-
              static bool was_connected = false;
              bool is_conn = wifi::global_wifi_component->is_connected();
              if (is_conn && !was_connected) {
                was_connected = true;
                return true;
              } else if (!is_conn) {
                was_connected = false;
              }
              return false;
          then:
            - script.execute: espnow_discovery

  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return ((esphome::VentilationController*)id(ventilation_ctrl))->pending_broadcast;"
          then:
            - lambda: |-
                auto data = build_and_populate_packet(esphome::MSG_SYNC);
                // Immediate changes via broadcast (robust)
                uint8_t broadcast_mac[6] = {0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF};
                esphome::espnow::global_esp_now->send(
                    broadcast_mac, data, [](esp_err_t err) {});
                // Additionally via unicast for reliable delivery
                send_sync_to_all_peers(data);
                // build_and_populate_packet/build_packet set pending_broadcast to false

  # Sync Controller Config every 60 seconds to ensure IDs match HA state
  - interval: 60s
    then:
      - lambda: |-
          sync_config_to_controller();

  # Automation Logic (CO2, Humidity, Summer/Winter)
  - interval: 10s
    id: auto_mode_interval
    then:
      # Retry config sync if IDs are still 0 (Safety guard for boot-time race conditions)
      - lambda: |-
          if (ventilation_ctrl->device_id == 0) {
            sync_config_to_controller();
          }
      - lambda: |-
          evaluate_auto_mode();

  # Fan Speed Update (Presence check for all modes)
  - interval: 10s
    then:
      - lambda: |-
          fan_speed_update->execute();

  # --- Status & Error Monitoring ---

  # Master LED Error Check: Blink if WiFi disconnected or no ESP-NOW peer within 5 min
  # Recurring check every 30s ensures errors are caught even if no other state changes.
  - interval: 30s
    then:
      - lambda: |-
          check_master_led_error();

  # Filter Maintenance: Track operating hours (only when fan is running)
  - interval: 60s
    then:
      - lambda: |-
          update_filter_analytics();

  # Health Check: Automated Reboot if the loop is effectively "zombie"
  # (No logic updates triggered from the main loop for 10 minutes)
  - interval: 300s
    id: health_check_timer
    then:
      - lambda: |-
          #include <esp_task_wdt.h>
          #include <esp_system.h>
          auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
          uint32_t now = millis();
          
          if (v->last_loop_ms == 0) return; // Wait for first loop
          
          // We check if the VentilationController::loop() has been running.
          // If the last loop timestamp is older than 10 minutes, the brain is frozen.
          if (now - v->last_loop_ms > 600000) { 
            ESP_LOGE("health", "CRITICAL: Brain freeze detected (loop stalled). Forcing recovery.");
            esp_task_wdt_reset(); // feed once to allow log buffer to flush
            delay(200);
            esp_restart();
          }
