# ---------------------------------------------------------
# GLOBALS
# ---------------------------------------------------------
globals:
  - id: intensity_bounce_up
    type: bool
    initial_value: "true" # Start by incrementing up to 10
    restore_value: no

# ---------------------------------------------------------
# PID CLIMATE CONTROLLERS (Internal)
# ---------------------------------------------------------
climate:
  - platform: pid
    name: "PID CO2 Automatik"
    id: pid_co2
    sensor: effective_co2
    default_target_temperature: 1000 # Target CO2 in ppm
    cool_output: pid_co2_output # Output for fan speed
    internal: true
    control_parameters:
      # P-Anteil: 0.002 bedeutet +20% Lüfterleistung pro 100ppm über dem Ziel.
      # Bei Target 1000ppm: 1000ppm = 0%, 1250ppm = 50%, 1500ppm = 100%
      kp: 0.002
      # I-Anteil: Extrem niedrig! (Hier ca. 1.8% mehr Leistung pro Minute bei 100ppm Überschreitung)
      ki: 0.000003
      kd: 0.0
      output_averaging_samples: 5
    deadband_parameters:
      # Sehr enges Deadband, damit er weich auf 0% runterdrehen kann.
      threshold_high: 10.0
      threshold_low: -10.0

  - platform: pid
    name: "PID Feuchte Automatik"
    id: pid_humidity
    sensor: scd41_humidity
    default_target_temperature: 60
    cool_output: pid_humidity_output
    internal: true
    control_parameters:
      # P-Anteil: Bei 60% Sollwert bedeutet kp:0.1 -> bei 65% rF läuft er sanft auf 50%
      kp: 0.1
      # I-Anteil: Auch hier deutlich verkleinern (Mit diesem Wert gibt es bei 5% Rest-Feuchte ca. +3% Leistung pro Minute)
      ki: 0.0001
      kd: 0.0
      output_averaging_samples: 5
    deadband_parameters:
      threshold_high: 1.0
      threshold_low: -1.0

# ---------------------------------------------------------
# AUTOMATIONS & SWITCHES
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Fan Direction"
    id: fan_direction
    internal: true
    optimistic: true
    turn_on_action:
      - lambda: |-
          notify_fan_direction_changed();
          id(fan_direction).publish_state(true);
      - script.execute: fan_speed_update
    turn_off_action:
      - lambda: |-
          notify_fan_direction_changed();
          id(fan_direction).publish_state(false);
      - script.execute: fan_speed_update

  # CO2-based adaptive fan control (on/off)
  - platform: template
    name: "CO2 Automatik"
    id: automatik_co2
    icon: "mdi:molecule-co2"
    optimistic: false
    lambda: |-
      return id(co2_auto_enabled);
    turn_on_action:
        - lambda: |-
            if (std::isnan(id(effective_co2).state)) {
              ESP_LOGW("co2_auto", "Kein CO2-Sensor verfügbar (SCD41/BME680) — CO2 Automatik kann nicht aktiviert werden");
            } else {
              id(co2_auto_enabled) = true;
              id(ventilation_ctrl)->trigger_sync();
              ESP_LOGI("co2_auto", "CO2 Automatik aktiviert");
            }
    turn_off_action:
        - lambda: |-
            id(co2_auto_enabled) = false;
            id(ventilation_ctrl)->trigger_sync();
            ESP_LOGI("co2_auto", "CO2 Automatik deaktiviert");

  # ESP-NOW Peer Check (disable to suppress Master LED blinking without peers)
  - platform: template
    name: "ESP-NOW Peerprüfung"
    id: peer_check_switch
    icon: "mdi:access-point-network"
    optimistic: false
    lambda: |-
      return id(peer_check_enabled);
    turn_on_action:
        - lambda: |-
            id(peer_check_enabled) = true;
            id(ventilation_ctrl)->trigger_sync();
            ESP_LOGI("espnow", "Peer check enabled");
    turn_off_action:
        - lambda: |-
            id(peer_check_enabled) = false;
            id(ventilation_ctrl)->trigger_sync();
            ESP_LOGI("espnow", "Peer check disabled");

# ---------------------------------------------------------
# SCRIPTS (Complex Logic)
# ---------------------------------------------------------
script:
  # LED Logic Handler
  - id: update_leds
    mode: restart
    then:
      - lambda: |-
          update_leds_logic();

  # Auto-Dimming UI Timer (30s)
  - id: ui_timeout_script
    mode: restart
    then:
      - globals.set:
          id: ui_active
          value: "true"
      - script.execute: update_leds
      - delay: 30s
      - globals.set:
          id: ui_active
          value: "false"
      - script.execute: update_leds

  # Unified Fan Speed and Direction Control
  - id: set_fan_speed_and_direction
    parameters:
      speed: float # 0.0-1.0 (duty cycle)
      direction: int # 0 = Direction A, 1 = Direction B
    then:
      - lambda: |-
          set_fan_logic(speed, direction);

  # Fan Speed Update (called when intensity or mode changes)
  - id: fan_speed_update
    mode: restart
    then:
      - lambda: update_fan_logic();

  # --- Light Sleep Management ---
  # Reduces power by turning off WiFi and LEDs
  - id: system_sleep
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("sleep", "Entering Light Sleep Mode (WiFi OFF, LEDs OFF)");
      - switch.turn_off: pca9685_oe
      - wifi.disable:
  
  # Restores full operation
  - id: system_wakeup
    mode: restart
    then:
      - lambda: |-
          ESP_LOGI("sleep", "Waking up from Light Sleep (WiFi ON, LEDs ON)");
      - wifi.enable:
      - switch.turn_on: pca9685_oe

  # Intensity Hold Handler: every 1s, trigger the bounce logic in automation_helpers.h
  - id: intensity_hold_handler
    mode: restart
    then:
      - delay: 750ms # Wait slightly to distinguish from a short click
      - while:
          condition:
            lambda: return id(button_level).state;
          then:
            - lambda: handle_intensity_bounce();
            - delay: 1000ms

# ---------------------------------------------------------
# CONTROL PANEL BUTTONS (Input)
# ---------------------------------------------------------
binary_sensor:
  # Button Power (Left) - On/Off (MCP23017 GPA0)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 0 # GPA0
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Power"
    id: button_power
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      - min_length: 50ms
        max_length: 4999ms
        then:
          - lambda: |-
              handle_button_power_short_click();
      - min_length: 5000ms
        max_length: 9999ms
        then:
          - lambda: |-
              handle_button_power_long_click();
      - min_length: 10000ms
        max_length: 60000ms
        then:
          - lambda: |-
              handle_button_power_long_click();
          - button.press: system_reboot
  # Button Mode (Right) - Mode Control (MCP23017 GPA1)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 1 # GPA1
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Mode"
    id: button_mode
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      then:
        - lambda: |-
            handle_button_mode_click();

  # Button Level (Middle) - Speed Level (MCP23017 GPA2)
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: 2 # GPA2
      mode:
        input: true
      inverted: true # Pressed = Low -> Inverted = ON
    name: "Button Fan Intensity"
    id: button_level
    # ⚡ THIS IS THE SOFTWARE DEBOUNCING ⚡
    filters:
      - delayed_on: 25ms # Ignores any bouncing that is shorter than 25ms.
      - delayed_off: 25ms # Prevents "ghost presses" when releasing the button.
    on_click:
      # Short press: Cycle through intensity levels 1→10→1
      - min_length: 50ms
        max_length: 749ms # Slightly shorter than the hold handler delay
        then:
          - lambda: |-
              handle_button_level_click();
    on_press:
      - script.execute: intensity_hold_handler
    on_release:
      - script.stop: intensity_hold_handler

button:
  - platform: restart
    id: system_reboot
    name: "System Reboot"

# ---------------------------------------------------------
# VENTILATION CONTROL
# ---------------------------------------------------------

# Interval to check for pending broadcasts
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return ((esphome::VentilationController*)id(ventilation_ctrl))->pending_broadcast;"
          then:
            - lambda: |-
                ESP_LOGD("espnow_debug", "YAML Interval triggered: pending_broadcast is TRUE. Calling espnow.send...");
            - espnow.broadcast:
                data: !lambda |-
                  return build_and_populate_packet(esphome::MSG_SYNC);

  # Automatik Logik (CO2, Feuchte, Sommer/Winter)
  - interval: 10s
    id: auto_mode_interval
    then:
      - lambda: |-
          evaluate_auto_mode();

  # Lüfter-Geschwindigkeits-Update (Präsenz-Check für alle Modi)
  - interval: 10s
    then:
      - lambda: |-
          fan_speed_update->execute();

  # --- Status & Error Monitoring ---

  # Master LED Error Check: Blink if WiFi disconnected or no ESP-NOW peer within 5 min
  # Recurring check every 30s ensures errors are caught even if no other state changes.
  - interval: 30s
    then:
      - lambda: |-
          check_master_led_error();

  # Filter Maintenance: Track operating hours (only when fan is running)
  - interval: 60s
    then:
      - lambda: |-
          // Increment operating hours only when fan is ON and system is active
          if (id(system_on) && id(ventilation_enabled)) {
            id(filter_operating_hours) += (1.0f / 60.0f); // +1 minute in hours
          }
          // Set initial timestamp on first boot if not yet set
          if (id(filter_last_change_ts) == 0 && id(sntp_time).now().is_valid()) {
            id(filter_last_change_ts) = id(sntp_time).now().timestamp;
            ESP_LOGI("filter", "Initial filter timestamp set: %d", id(filter_last_change_ts));
          }
