sensor:
  # Home Assistant Data (Automation): 
  # Entity filled with data from Home Assistant. 
  # Must be configured as described in readme.md
  - platform: homeassistant
    name: "Außenluftfeuchtigkeit"
    id: outdoor_humidity
    entity_id: sensor.outdoor_humidity
    internal: true

binary_sensor:
  # Summer mode gate for automatic summer cooling.
  # Provided by HA template: season (April-October) AND outdoor temp > 18°C.
  # When unavailable (HA offline), defaults to false → heat recovery stays active (safe).
  - platform: homeassistant
    name: "Sommerbetrieb"
    id: sommerbetrieb
    entity_id: binary_sensor.sommerbetrieb
    internal: true

  # Window Guard (Fenstersperre) - HA State
  - platform: homeassistant
    name: "Fenstersperre"
    id: window_locked
    entity_id: ${window_sensor_id}
    internal: true
    
  # Vacation Mode (Urlaubsmodus) - HA State
  - platform: homeassistant
    name: "Urlaubsmodus Sensor"
    id: vacation_mode_ha
    entity_id: ${vacation_sensor_id}
    internal: true
    on_press:
      - script.execute: handle_vacation_mode_on
    on_release:
      - script.execute: handle_vacation_mode_off
