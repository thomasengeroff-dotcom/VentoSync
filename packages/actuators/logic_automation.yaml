# ==========================================================================
# VentoSync HRV – logic_automation.yaml (Refactored)
# ==========================================================================

# ---------------------------------------------------------
# SWITCHES
# ---------------------------------------------------------
switch:
  - platform: template
    name: "Lüfterrichtung"
    id: fan_direction
    internal: true
    optimistic: true
    turn_on_action:
      - lambda: "notify_fan_direction_changed();"
      - lambda: "id(fan_direction).publish_state(true);"
      - script.execute: fan_speed_update
    turn_off_action:
      - lambda: "notify_fan_direction_changed();"
      - lambda: "id(fan_direction).publish_state(false);"
      - script.execute: fan_speed_update

# ---------------------------------------------------------
# SCRIPTS
# ---------------------------------------------------------
script:
  - id: handle_vacation_mode_on
    mode: restart
    then:
      - lambda: "activate_vacation_mode();"

  - id: handle_vacation_mode_off
    mode: restart
    then:
      - lambda: "deactivate_vacation_mode();"

  - id: set_fan_speed_and_direction
    parameters:
      speed: float
      direction: int
    then:
      - lambda: "set_fan_logic(speed, direction);"

  - id: fan_speed_update
    mode: restart
    then:
      - lambda: "update_fan_logic();"

  - id: intensity_hold_handler
    mode: restart
    then:
      - delay: 750ms
      - while:
          condition:
            lambda: "return id(button_level).state;"
          then:
            - lambda: "handle_intensity_bounce();"
            - delay: 500ms

# ---------------------------------------------------------
# INTERVALS
# ---------------------------------------------------------
interval:
  # WiFi reconnect → ESP-NOW rediscovery
  - interval: 2s
    then:
      - if:
          condition:
            lambda: "return wifi_just_connected();"
          then:
            - script.execute: espnow_discovery

  # Process pending ESP-NOW state broadcasts
  - interval: 1s
    then:
      - lambda: "process_pending_broadcast();"

  # Periodic controller config sync (catch HA state drift)
  - interval: 60s
    then:
      - lambda: "sync_config_to_controller();"

  # Core automation (CO2, humidity, summer/winter)
  - interval: 10s
    id: auto_mode_interval
    then:
      - lambda: "guard_config_sync();"
      - lambda: "evaluate_auto_mode();"

  # Fan speed slew-rate tick (must be ≤5s)
  - interval: 1s
    then:
      - lambda: "fan_speed_update->execute();"

  # Master LED error monitoring
  - interval: 30s
    then:
      - lambda: "check_master_led_error();"

  # Filter maintenance hour tracking
  - interval: 60s
    then:
      - lambda: "update_filter_analytics();"

  # Brain-freeze health check
  - interval: 300s
    id: health_check_timer
    then:
      - lambda: "check_brain_health();"

  # Periodic ESP-NOW peer rediscovery
  - interval: 5min
    then:
      - lambda: "periodic_peer_rediscovery();"
