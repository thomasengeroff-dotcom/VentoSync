# File:        ventosync.yaml
# Description: Main ESPHome configuration for the room ventilation system.
#              Controls fan, clusters via ESP-NOW, and integrates with HA.
# Author:      Thomas Engeroff
# Created:     2026-01-27
# Modified:    2026-04-21
# ==========================================================================
substitutions:
  device_name: ventosync
  friendly_name: "VentoSync - Smart HRV"

  # VENTILATION CONFIG - Default Values
  # These are initial values. The actual configuration can be changed
  # via Home Assistant and is stored persistently in flash memory.
  floor_id: "1"
  room_id: "1"
  device_id: "1"
  # Phase A = Starts with INTAKE (Rein). Phase B = Starts with EXHAUST (Raus).
  # Devices on same wall should have same phase.
  is_phase_a: "true"

  # WINDOW GUARD CONFIG
  # Entity ID of the Home Assistant binary sensor (group) for windows in this room.
  # Default convention: binary_sensor.ventosync_window_lock_room_${room_id}
  window_sensor_id: "binary_sensor.ventosync_window_lock_room_${room_id}"

  # VACATION MODE CONFIG
  # Entity ID of the Home Assistant input_boolean helper for vacation mode.
  vacation_sensor_id: "input_boolean.ventosync_vacation_mode"

  # NTC plausibility ranges (adjust for your climate zone)
  ntc_indoor_min: "-25.0"
  ntc_indoor_max: "55.0"
  ntc_outdoor_min: "-30.0"
  ntc_outdoor_max: "50.0"
  # Fail-safe timeout: must be > 2× cycle duration
  ntc_timeout: "120s"
  # Set to "true" to hide NTC sensors from HA frontend
  hide_ntc_sensors: "false"

# ---------------------------------------------------------
# PACKAGES & INCLUDES
# ---------------------------------------------------------
packages:
  # --- Global Variables (thematisch aufgeteilt) ---
  globals_ventilation: !include ../globals/globals_ventilation.yaml
  globals_automation: !include ../globals/globals_automation.yaml
  globals_ui: !include ../globals/globals_ui.yaml
  globals_network: !include ../globals/globals_network.yaml

  # --- Device & Hardware ---
  common: !include esp32c6_common.yaml
  device_config_pkg: !include device_config.yaml
  hardware: !include ../io/hardware_io.yaml
  communication: !include ../communication/esp_now.yaml
  sensors: !include ../sensors/sensors_climate.yaml
  fan_hardware: !include ../io/hardware_fan.yaml
  bmp390: !include ../sensors/sensor_BMP390.yaml
  ntc: !include ../sensors/sensor_NTC.yaml
  hrv_efficiency: !include ../sensors/sensor_hrv_efficiency.yaml

  # --- User Interface ---
  ui: !include ../ui/ui_controls.yaml
  lights: !include ../ui/ui_lights.yaml
  diagnostics: !include ../ui/ui_diagnostics.yaml

  # --- Actuators & Logic ---
  logic: !include ../actuators/logic_automation.yaml
  buttons: !include ../io/logic_buttons.yaml
  pid: !include ../actuators/logic_pid.yaml
  maintenance: !include ../actuators/logic_maintenance.yaml
  safety: !include ../actuators/logic_safety.yaml

  # --- Home Assistant Integration ---
  integration: !include ../integration/homeassistant.yaml
  ha_fan: !include ../integration/ha_fan_entity.yaml

external_components:
  - source:
      type: local
      path: components

esphome:
  includes:
    - include/globals.h
    - include/automation_helpers.h
    - include/config_helpers.h
    - include/vacation_helpers.h
    - include/health_helpers.h
    - include/espnow_helpers.h
    - include/system_boot_helpers.h
    - include/network_sync.h
    - include/climate.h
    - include/hrv_efficiency.h
    - include/auto_mode.h
    - include/system_lifecycle.h
    - include/led_feedback.h
    - include/user_input.h
    - include/bme680_iaq_engine.h

  name_add_mac_suffix: true # Adds MAC address to device name (because same firmware is used for all devices)

  on_boot:
    # ── Priority 900: Hardware RF Switch (before WiFi starts) ──
    - priority: 900
      then:
        - lambda: "init_external_antenna();"

    # ── Priority 600: Boot Diagnostics ──
    - priority: 600
      then:
        - lambda: "log_boot_diagnostics();"

    # ── Priority -10: Core Init + ESP-NOW Discovery ──
    - priority: -10.0
      then:
        # Phase 1: Core system initialization
        - delay: 1s
        - lambda: "init_core_system();"

        # Phase 2: Staggered ESP-NOW discovery broadcasts
        - delay: 1s
        - lambda: "boot_discovery_broadcast(1);"
        - delay: 2s
        - lambda: "boot_discovery_broadcast(2);"
        - delay: 2s
        - lambda: "boot_discovery_broadcast(3);"
        - delay: 1s
        - lambda: "boot_finish_discovery();"

    # ── Priority -100: Enable PCA9685 LED driver ──
    - priority: -100
      then:
        - switch.turn_on: pca9685_oe

# ---------------------------------------------------------
# VENTILATION COMPONENT (External)
# ---------------------------------------------------------
ventilation_group:
  id: ventilation_ctrl
  floor_id: ${floor_id}
  room_id: ${room_id}
  device_id: ${device_id}
  is_phase_a: ${is_phase_a}
  main_fan: lueftung_fan
  direction_switch: fan_direction
  window_sensor: window_locked
  fan_rpm_sensor: fan_rpm
  board_temp_sensor: temperature
  scd41_temp_sensor: scd41_temperature
  bme680_temp_sensor: bme680_temperature
  mode_index_global: current_mode_index
  automatik_min_fan_level_global: automatik_min_fan_level
  automatik_max_fan_level_global: automatik_max_fan_level
  auto_co2_threshold_global: auto_co2_threshold_val
  auto_humidity_threshold_global: auto_humidity_threshold_val
  auto_presence_global: auto_presence_val
  max_led_brightness_global: max_led_brightness

# Pure C++ helper library (IAQ classification, ramp logic, fan level cycling)
ventilation_logic:

