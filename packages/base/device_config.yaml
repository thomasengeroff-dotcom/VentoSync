# ==========================================================================
# VentoSync HRV – device_config.yaml (Refactored)
# ==========================================================================

# ---------------------------------------------------------
# SUBSTITUTIONS
# ---------------------------------------------------------
substitutions:
  default_floor_id: "1"
  default_room_id: "1"
  default_device_id: "1"
  default_phase: "true"

# ---------------------------------------------------------
# CONFIGURATION INPUTS (Persistent)
# ---------------------------------------------------------
number:
  - platform: template
    name: "ID Stockwerk"
    id: config_floor_id
    icon: "mdi:office-building"
    min_value: 0
    max_value: 9
    step: 1
    initial_value: ${default_floor_id}
    optimistic: true
    restore_value: true
    entity_category: config
    set_action:
      then:
        - lambda: "update_config_id(ventosync::config::ConfigField::FLOOR_ID, x);"

  - platform: template
    name: "ID Raum"
    id: config_room_id
    icon: "mdi:door"
    min_value: 0
    max_value: 10
    step: 1
    initial_value: ${default_room_id}
    optimistic: true
    restore_value: true
    entity_category: config
    set_action:
      then:
        - lambda: "update_config_id(ventosync::config::ConfigField::ROOM_ID, x);"

  - platform: template
    name: "ID Gerät"
    id: config_device_id
    icon: "mdi:numeric"
    min_value: 1
    max_value: 25
    step: 1
    initial_value: ${default_device_id}
    optimistic: true
    restore_value: true
    entity_category: config
    set_action:
      then:
        - lambda: "update_config_id(ventosync::config::ConfigField::DEVICE_ID, x);"

# ---------------------------------------------------------
# PHASE SELECTION
# ---------------------------------------------------------
select:
  - platform: template
    name: "Geräte-Phase (A|B)"
    id: config_phase
    icon: "mdi:swap-horizontal"
    options:
      - "Phase A (Startet mit Zuluft)"
      - "Phase B (Startet mit Abluft)"
    initial_option: "Phase A (Startet mit Zuluft)"
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: "update_phase_config(x);"

# ---------------------------------------------------------
# DEVICE INFO SENSORS
# ---------------------------------------------------------
text_sensor:
  - platform: wifi_info
    mac_address:
      name: "Eigene MAC Adresse"
      id: own_mac_address
      internal: true
      icon: "mdi:identifier"
      entity_category: diagnostic

  - platform: template
    name: "Geräte-Konfiguration"
    id: device_config_summary
    icon: "mdi:information"
    entity_category: diagnostic
    lambda: "return build_config_summary();"
    update_interval: 60s

  - platform: template
    name: "Dashboard Geräte ID"
    id: dashboard_device_id
    internal: true
    lambda: "return std::to_string((int)id(config_device_id).state);"
    update_interval: 60s

  - platform: template
    name: "Dashboard Stockwerk ID"
    id: dashboard_floor_id
    internal: true
    lambda: "return std::to_string((int)id(config_floor_id).state);"
    update_interval: 60s

  - platform: template
    name: "Dashboard Raum ID"
    id: dashboard_room_id
    internal: true
    lambda: "return std::to_string((int)id(config_room_id).state);"
    update_interval: 60s

  - platform: template
    name: "Dashboard Phase"
    id: dashboard_phase
    internal: true
    lambda: "return get_phase_short();"
    update_interval: 60s

# ---------------------------------------------------------
# CONFIGURATION BUTTONS
# ---------------------------------------------------------
button:
  - platform: template
    name: "Auf Standardwerte zurücksetzen"
    icon: "mdi:restore"
    entity_category: config
    on_press:
      then:
        - number.set:
            id: config_floor_id
            value: ${default_floor_id}
        - number.set:
            id: config_room_id
            value: ${default_room_id}
        - number.set:
            id: config_device_id
            value: ${default_device_id}
        - select.set:
            id: config_phase
            option: "Phase A (Startet mit Zuluft)"
        - logger.log: "Konfiguration auf Standardwerte zurückgesetzt"

  - platform: template
    name: "Force ESPNOW Discovery"
    icon: "mdi:access-point-network"
    entity_category: diagnostic
    on_press:
      then:
        - lambda: "force_discovery_with_diagnostics();"

# ---------------------------------------------------------
# CONFIGURATION SENSORS
# ---------------------------------------------------------
sensor:
  - platform: template
    name: "ID Stockwerk"
    id: current_floor_id
    icon: "mdi:office-building"
    entity_category: diagnostic
    lambda: "return id(config_floor_id).state;"
    update_interval: 60s

  - platform: template
    name: "ID Raum"
    id: current_room_id
    icon: "mdi:door"
    entity_category: diagnostic
    lambda: "return id(config_room_id).state;"
    update_interval: 60s

  - platform: template
    name: "ID Gerät"
    id: current_device_id
    icon: "mdi:numeric"
    entity_category: diagnostic
    lambda: "return id(config_device_id).state;"
    update_interval: 60s

  - platform: internal_temperature
    name: "Internal ESP32-C6 Temperature"
    entity_category: diagnostic

# ---------------------------------------------------------
# SCRIPTS
# ---------------------------------------------------------
script:
  - id: system_sleep
    mode: restart
    then:
      - lambda: "ESP_LOGI(\"sleep\", \"Entering Light Sleep Mode (WiFi OFF, LEDs OFF)\");"
      - switch.turn_off: pca9685_oe
      - wifi.disable:

  - id: system_wakeup
    mode: restart
    then:
      - lambda: "ESP_LOGI(\"sleep\", \"Waking up from Light Sleep (WiFi ON, LEDs ON)\");"
      - wifi.enable:
      - switch.turn_on: pca9685_oe
