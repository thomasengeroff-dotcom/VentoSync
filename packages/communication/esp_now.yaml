# File:        esp_now.yaml
# Description: ESP-NOW communication and peer discovery for device cluster.
# Author:      Thomas Engeroff
# Created:     2026-03-07
# Modified:    2026-05-16
# ==========================================================================

espnow:
  id: espnow_component
  auto_add_peer: false
  # FF:FF:FF:FF:FF:FF must be in peers for the C++ send() API
  # to broadcast discovery/status packets.
  peers:
    - FF:FF:FF:FF:FF:FF

  # --- Unified Receive Handlers ---
  # All three callbacks route through dispatch_espnow_packet() in
  # espnow_helpers.h – single code path, zero duplication.

  on_broadcast:
    - lambda: |-
        dispatch_espnow_packet(data, size, info.src_addr,
                               ventosync::espnow::RxSource::BROADCAST);

  on_receive:
    - lambda: |-
        dispatch_espnow_packet(data, size, info.src_addr,
                               ventosync::espnow::RxSource::UNICAST);

  on_unknown_peer:
    - lambda: |-
        dispatch_espnow_packet(data, size, info.src_addr,
                               ventosync::espnow::RxSource::UNKNOWN_PEER);

# ---------------------------------------------------------
# ESP-NOW PEER WATCHDOG
# ---------------------------------------------------------
interval:
  - interval: 60s
    then:
      - lambda: "peer_presence_watchdog();"

# ---------------------------------------------------------
# SCRIPTS
# ---------------------------------------------------------
script:
  # ESP-NOW Discovery: Load peers from flash, broadcast, request status
  - id: espnow_discovery
    mode: single
    then:
      # Phase 1: Network discovery
      - lambda: "load_peers_from_runtime_cache();"
      - lambda: "send_discovery_broadcast();"
      - delay: 2s
      - lambda: "request_peer_status();"

      # Phase 2: Post-boot UI initialization
      # Runs here (not in on_boot) to avoid I2C bus contention
      # with sensor initialization on the shared bus.
      - delay: 500ms
      - script.execute: post_boot_ui_init

  # Separated UI init for Single Responsibility
  - id: post_boot_ui_init
    mode: single
    then:
      - lambda: "run_led_self_test();"
      - delay: 3s
      - lambda: "update_leds_logic(true);"
      - script.execute: ui_timeout_script
      - script.execute: fan_speed_update
