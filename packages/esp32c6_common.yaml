substitutions:
  # The project version is automatically updated by version_bump.py during build.
  # Do not change manually unless you know what you are doing.
  project_version: "0.8.27"

globals:
  - id: thermal_warning_active
    type: bool
    initial_value: 'false'

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  project:
    name: "thomasengeroff.ventosync"
    version: "${project_version}"
  # Force specific flash mode for better stability with C6
  platformio_options:
    board_build.flash_mode: dio
    extra_scripts:
      - pre:../../../version_bump.py

# ---------------------------------------------------------
# MICROCONTROLLER SETTINGS (Seeed XIAO ESP32C6)
# ---------------------------------------------------------
esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf # The ESP32-C6 is newer and currently runs more stable with the official ESP-IDF framework than Arduino

    sdkconfig_options:
      # Fix for "httpd_accept_conn: error in accept (23) ENFILE" 
      # Increases max open sockets for Web-Dashboard SSE connections
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_VFS_SUPPORT_IO: "y"
      # Watchdog-Einstellungen optimieren:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"  # Kürzerer WDT (Standard ist oft 5s, aber mit I2C/WiFi-Last sind 15s sicher)
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: "y"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU1: "y"
      
      # Zusätzliche Optionen für bessere Stabilität (aus Benutzer-Diagnose):
      CONFIG_ESP_TASK_WDT_INIT: "y"
      CONFIG_FREERTOS_WDT_EN: "y"
      CONFIG_FREERTOS_WDT_CHECK_IDLE_TASK: "y"

# ---------------------------------------------------------
# LOGGING & DEBUGGING
# ---------------------------------------------------------
# Enables serial logging over USB-C
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG  # Erhöht für bessere Diagnose-Daten während der Fehlersuche
  logs:
    sensor: ERROR    # Reduziere andere Logs zur Performance-Schonung
    binary_sensor: ERROR
    switch: ERROR
    pulse_counter: NONE # Verhindert "0.00" Spam bei Lüftern ohne Tacho
    # Fokus auf Lüftungssteuerung:
    vent: DEBUG
    vent_sync: DEBUG

# Enables memory and system diagnostics
debug:

# Enables emergency sleep mode for temperature protection
deep_sleep:
  id: safety_sleep

# ---------------------------------------------------------
# HOME ASSISTANT API
# ---------------------------------------------------------
# Native API for direct integration with Home Assistant (faster/better than MQTT)
api:
  encryption:
    key: !secret api_encryption_key

# ---------------------------------------------------------
# OVER-THE-AIR UPDATES (OTA)
# ---------------------------------------------------------
# Allows flashing new firmware wirelessly without USB cable
ota:
  - platform: esphome
    password: !secret otapw
  - platform: http_request

# ---------------------------------------------------------
# HTTP FIRMWARE UPDATE (Local Intranet / Home Assistant)
# ---------------------------------------------------------
# Requires an HTTP server to host the manifest.json and the firmware.bin
http_request:

update:
  - platform: http_request
    name: "Firmware Update"
    # The /local/ folder corresponds to the "www" folder in the Home Assistant Samba Share
    source: "http://192.168.178.45:8123/local/firmware/ventosync/manifest.json"
    update_interval: 2h

# ---------------------------------------------------------
# WIFI CONNECTIVITY
# ---------------------------------------------------------
wifi:
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true # Prevent long channel scans during reconnects (vital for ESP-NOW coexistence/I2C stability)
  reboot_timeout: 1min # Shorter timeout for faster recovery during debugging
  min_auth_mode: WPA2
  power_save_mode: LIGHT # none hat eventuell zu Problemen geführt

  # Fallback Hotspot:
  # If the configured WiFi is not reachable within 1 minute, the device
  # opens its own Hotspot (Captive Portal) to allow reconfiguration.
  ap:
    ssid: "${device_name} Hotspot"
    password: !secret appw

# ---------------------------------------------------------
# WEB INTERFACE
# ---------------------------------------------------------
web_server_base:
  id: my_web_server_base

# Visit http://<device-ip> to see a simple control dashboard and logs
web_server:
  port: 80
  local: true
  auth:
    username: !secret webuser
    password: !secret webpw

# ---------------------------------------------------------
# TIME SYNCHRONIZATION
# ---------------------------------------------------------
# Syncs time from Home Assistant (needed for logs, charts, daily schedules)
time:
  - platform: homeassistant
    id: homeassistant_time
  - platform: sntp
    id: sntp_time


# ---------------------------------------------------------
# SYSTEM DIAGNOSTICS (SENSORS)
# ---------------------------------------------------------
sensor:
  # Monitors WiFi connection quality (-50dBm is great, -90dBm is unusable)
  - platform: wifi_signal
    name: "WLAN Signal"
    id: sensor_wifi_signal
    update_interval: 60s
    accuracy_decimals: 0
    entity_category: diagnostic

  # -- Diagnostic: Watchdog Restarts --
  - platform: template
    name: "Watchdog Restarts"
    id: watchdog_restarts
    unit_of_measurement: "reboots"
    icon: "mdi:restart-alert"
    entity_category: diagnostic
    update_interval: never

  # Internal RAM monitoring
  - platform: debug
    free:
      name: "Freier Speicher (RAM)"
      id: sensor_free_ram
      entity_category: diagnostic

  # WiFi Channel diagnostic
  - platform: template
    name: "WLAN Kanal"
    id: sensor_wifi_channel
    lambda: |-
      return (float)id(wifi_component).get_wifi_channel();
    update_interval: 60s
    accuracy_decimals: 0
    entity_category: diagnostic

  # Tracks how long the device has been running without crash/reboot
  - platform: uptime
    name: "Laufzeit"
    id: sensor_uptime
    unit_of_measurement: h
    update_interval: 300s
    accuracy_decimals: 1
    filters:
      - multiply: 0.000277778 # Convert seconds to hours
    entity_category: diagnostic
    
# ---------------------------------------------------------
# SYSTEM INFORMATION (TEXT)
# ---------------------------------------------------------
text_sensor:
  # Reports current firmware version (useful to check if update worked)
  - platform: version
    name: "ESPHome Version"

  # Reports current IP and connected SSID
  - platform: wifi_info
    ip_address:
      name: "IP-Adresse"
      id: sensor_ip_address
    ssid:
      name: "WLAN SSID"

  # Custom Project Version (auto-incremented on compile)
  - platform: template
    name: "Projektversion"
    id: text_project_version
    icon: "mdi:tag-outline"
    entity_category: diagnostic
    lambda: |-
      #ifdef CUSTOM_PROJECT_VERSION
        return {CUSTOM_PROJECT_VERSION};
      #else
        return {"0.0.0-dev"};
      #endif
