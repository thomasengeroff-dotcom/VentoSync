substitutions:
  # The project version is automatically updated by version_bump.py during build.
  # Do not change manually unless you know what you are doing.
  project_version: "0.6.66"

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  project:
    name: "thomasengeroff.wohnraumlueftung"
    version: "${project_version}"
  # Force specific flash mode for better stability with C6
  platformio_options:
    board_build.flash_mode: dio
    extra_scripts:
      - pre:../../../version_bump.py

# ---------------------------------------------------------
# MICROCONTROLLER SETTINGS (Seeed XIAO ESP32C6)
# ---------------------------------------------------------
esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf # The ESP32-C6 is newer and currently runs more stable with the official ESP-IDF framework than Arduino

    # Optional: Enable SDKCONFIG options if deep debugging is needed
    # sdkconfig_options:
    #   CONFIG_FREERTOS_UNICORE: "y"

# ---------------------------------------------------------
# LOGGING & DEBUGGING
# ---------------------------------------------------------
# Enables serial logging over USB-C
logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG # Reduced from DEBUG for performance

# ---------------------------------------------------------
# HOME ASSISTANT API
# ---------------------------------------------------------
# Native API for direct integration with Home Assistant (faster/better than MQTT)
api:
  encryption:
    key: !secret api_encryption_key

# ---------------------------------------------------------
# OVER-THE-AIR UPDATES (OTA)
# ---------------------------------------------------------
# Allows flashing new firmware wirelessly without USB cable
ota:
  - platform: esphome
    password: !secret otapw
  - platform: http_request

# ---------------------------------------------------------
# HTTP FIRMWARE UPDATE (Local Intranet / Home Assistant)
# ---------------------------------------------------------
# Requires an HTTP server to host the manifest.json and the firmware.bin
http_request:

update:
  - platform: http_request
    name: "${device_name} Firmware Update"
    # The /local/ folder corresponds to the "www" folder in the Home Assistant Samba Share
    source: "http://192.168.178.45:8123/local/firmware/wohnraumlueftung/manifest.json"
    update_interval: 2h

# ---------------------------------------------------------
# WIFI CONNECTIVITY
# ---------------------------------------------------------
wifi:
  id: wifi_component
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: NONE

  # Fallback Hotspot:
  # If the configured WiFi is not reachable within 1 minute, the device
  # opens its own Hotspot (Captive Portal) to allow reconfiguration.
  ap:
    ssid: "${device_name} Hotspot"
    password: !secret appw

# ---------------------------------------------------------
# WEB INTERFACE
# ---------------------------------------------------------
web_server_base:
  id: my_web_server_base

# Visit http://<device-ip> to see a simple control dashboard and logs
web_server:
  port: 80
  local: true
  auth:
    username: !secret webuser
    password: !secret webpw

# ---------------------------------------------------------
# TIME SYNCHRONIZATION
# ---------------------------------------------------------
# Syncs time from Home Assistant (needed for logs, charts, daily schedules)
time:
  - platform: homeassistant
    id: homeassistant_time

# ---------------------------------------------------------
# SYSTEM DIAGNOSTICS (SENSORS)
# ---------------------------------------------------------
sensor:
  # Monitors WiFi connection quality (-50dBm is great, -90dBm is unusable)
  - platform: wifi_signal
    name: "${device_name} WiFi Signal"
    id: sensor_wifi_signal
    update_interval: 60s
    accuracy_decimals: 0
    entity_category: diagnostic

  # WiFi Channel diagnostic
  - platform: template
    name: "${device_name} WiFi Channel"
    id: sensor_wifi_channel
    lambda: |-
      return (float)id(wifi_component).get_wifi_channel();
    update_interval: 60s
    accuracy_decimals: 0
    entity_category: diagnostic

  # Tracks how long the device has been running without crash/reboot
  - platform: uptime
    name: "${device_name} Uptime"
    id: sensor_uptime
    unit_of_measurement: days
    update_interval: 300s
    accuracy_decimals: 1
    filters:
      - multiply: 0.000011574 # Convert seconds to days

# ---------------------------------------------------------
# SYSTEM INFORMATION (TEXT)
# ---------------------------------------------------------
text_sensor:
  # Reports current firmware version (useful to check if update worked)
  - platform: version
    name: "${device_name} ESPHome Version"

  # Reports current IP and connected SSID
  - platform: wifi_info
    ip_address:
      name: "${device_name} ip"
      id: sensor_ip_address
    ssid:
      name: "${device_name} ssid"

  # Custom Project Version (auto-incremented on compile)
  - platform: template
    name: "${device_name} Project Version"
    id: text_project_version
    icon: "mdi:tag-outline"
    entity_category: diagnostic
    lambda: |-
      #ifdef CUSTOM_PROJECT_VERSION
        return {CUSTOM_PROJECT_VERSION};
      #else
        return {"0.0.0-dev"};
      #endif
