# ---------------------------------------------------------
# LED LIGHTS (Monochromatic for Dimming)
# ---------------------------------------------------------
light:
  - platform: monochromatic
    output: out_led_pwr
    name: "Status LED Power"
    id: status_led_power
    internal: true
    default_transition_length: 0.5s # nice fading effect
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye
  - platform: monochromatic
    output: out_led_master
    name: "Status LED Master"
    id: status_led_master
    internal: true
    default_transition_length: 0s
    gamma_correct: 1.0
    effects:
      - strobe:
          name: "Error Peer"
          colors:
            - state: true
              brightness: 100%
              duration: 500ms
            - state: false
              duration: 200ms
            - state: true
              brightness: 100%
              duration: 500ms
            - state: false
              duration: 5000ms
      - strobe:
          name: "Error WiFi"
          colors:
            - state: true
              brightness: 100%
              duration: 500ms
            - state: false
              duration: 200ms
            - state: true
              brightness: 100%
              duration: 500ms
            - state: false
              duration: 200ms
            - state: true
              brightness: 100%
              duration: 500ms
            - state: false
              duration: 5000ms
      - strobe:
          name: "Warning Safety"
          colors:
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 100ms
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 100ms
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 100ms
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 2000ms
  - platform: monochromatic
    output: out_led_wrg
    name: "Status LED Modus WRG"
    id: status_led_mode_wrg # ID expected by automation_helpers.h
    internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0
    effects:
      - pulse:
          name: "Automatik Pulse"
          transition_length: 3.5s
          update_interval: 3.5s
          min_brightness: 5%
          max_brightness: 100%
  - platform: monochromatic
    output: out_led_vent
    name: "Status LED Modus Vent"
    id: status_led_mode_vent # Automation helper expects this ID
    internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye

  # Level LEDs
  - platform: monochromatic
    output: out_led_l1
    id: status_led_l1
    #internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye
  - platform: monochromatic
    output: out_led_l2
    id: status_led_l2
    #internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye
  - platform: monochromatic
    output: out_led_l3
    id: status_led_l3
    #internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye
  - platform: monochromatic
    output: out_led_l4
    id: status_led_l4
    #internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye
  - platform: monochromatic
    output: out_led_l5
    id: status_led_l5
    #internal: true
    default_transition_length: 0.5s
    gamma_correct: 1.0 # Optional: adjusts brightness curve for human eye

# ---------------------------------------------------------
# UI CONTROLS (Home Assistant)
# ---------------------------------------------------------
number:
  - platform: template
    name: "Durchlüften Dauer (min)"
    id: vent_timer
    min_value: 0
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            set_ventilation_timer(x);

  - platform: template
    name: "Sync Intervall"
    id: sync_interval_config
    icon: "mdi:sync"
    unit_of_measurement: "min"
    min_value: 1
    max_value: 360 # 6 hours
    step: 10
    initial_value: 180 # 3 hours
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            set_sync_interval_handler(x);

  - platform: template
    name: "Lüfter Intensität"
    id: fan_intensity_display
    icon: "mdi:fan-speed-1"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    #restore_value: true
    optimistic: false
    #initial_value: 1
    lambda: |-
      return id(fan_intensity_level);
    set_action:
      then:
        - lambda: |-
            set_fan_intensity_slider(x);

  - platform: template
    name: "Maximale LED Helligkeit"
    id: led_max_brightness_config
    icon: "mdi:brightness-6"
    unit_of_measurement: "%"
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 80
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(max_led_brightness) = x / 100.0f;
            id(update_leds).execute();
            sync_settings_to_peers();
            ESP_LOGI("ui", "Max LED brightness set to %.2f", id(max_led_brightness));

  # Auto Mode: Min Fan Level (moisture protection)
  - platform: template
    name: "Automatik Min Lüfterstufe"
    id: automatik_min_luefterstufe
    icon: "mdi:water-percent"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    optimistic: true
    initial_value: 2
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(automatik_min_fan_level) = (int)x;
            sync_settings_to_peers();
            ESP_LOGI("co2_auto", "Min fan level set to %d", (int)x);

  # Auto Mode: Max Fan Level (noise limiter)
  - platform: template
    name: "Automatik Max Lüfterstufe"
    id: automatik_max_luefterstufe
    icon: "mdi:volume-off"
    min_value: 1
    max_value: 10
    step: 1
    mode: slider
    optimistic: true
    initial_value: 7
    restore_value: true
    set_action:
      then:
        - lambda: |-
            id(automatik_max_fan_level) = (int)x;
            sync_settings_to_peers();
            ESP_LOGI("co2_auto", "Max fan level set to %d", (int)x);

  # Auto Mode CO2 Threshold
  - platform: template
    name: "Automatik: CO2 Grenzwert"
    id: auto_co2_threshold
    icon: "mdi:molecule-co2"
    min_value: 400
    max_value: 2000
    step: 50
    unit_of_measurement: "ppm"
    lambda: "return id(auto_co2_threshold_val);"
    set_action:
      - lambda: |-
          id(auto_co2_threshold_val) = (int)x;
          id(auto_co2_threshold).publish_state(x);
          auto call = id(pid_co2).make_call();
          call.set_target_temperature(x);
          call.perform();
          sync_settings_to_peers();

  # Auto Mode Humidity Threshold
  - platform: template
    name: "Automatik: Feuchte Grenzwert"
    id: auto_humidity_threshold
    icon: "mdi:water-percent"
    min_value: 40
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    lambda: "return id(auto_humidity_threshold_val);"
    set_action:
      - lambda: |-
          id(auto_humidity_threshold_val) = (int)x;
          id(auto_humidity_threshold).publish_state(x);
          auto call = id(pid_humidity).make_call();
          call.set_target_temperature(x);
          call.perform();
          sync_settings_to_peers();

  # -- Presence (Radar) Slider Behavior --
  - platform: template
    name: "Anwesenheit Lüfter-Anpassung"
    id: auto_presence_slider
    icon: mdi:fan-auto
    min_value: -5
    max_value: 5
    step: 1
    entity_category: config
    lambda: "return id(auto_presence_val);"
    set_action:
      - lambda: |-
          id(auto_presence_val) = x;
          id(auto_presence_slider).publish_state(x);
          sync_settings_to_peers();
          evaluate_auto_mode(); // Force re-eval

# ---------------------------------------------------------
# TEXT SENSORS (Status Display)
# ---------------------------------------------------------
text_sensor:
  - platform: template
    name: "Aktuelle Luftrichtung"
    id: direction_display
    icon: "mdi:directions-fork"
    lambda: |-
      if (last_fan_pwm_level < 0.45f) {
        return {"Abluft (Raus)"};
      } else if (last_fan_pwm_level > 0.55f) {
        return {"Zuluft (Rein)"};
      } else {
        return {"Stillstand"};
      }
    update_interval: 2s

# ---------------------------------------------------------
# VENTILATION MODE SELECTION
# ---------------------------------------------------------
select:
  # Ventilation Mode
  - platform: template
    name: "Lüftermodus"
    id: luefter_modus
    options:
      - "Automatik"
      - "Wärmerückgewinnung"
      - "Durchlüften"
      - "Stoßlüftung"
      - "Aus"
    initial_option: "Automatik"
    set_action:
      - lambda: |-
          set_operating_mode_select(x); // W5: pass std::string directly, not c_str()

# ---------------------------------------------------------
# FILTER MAINTENANCE
# ---------------------------------------------------------
binary_sensor:
  - platform: template
    name: "Filterwechsel Alarm"
    id: filter_change_alarm
    icon: "mdi:air-filter"
    device_class: problem
    lambda: |-
      // Alarm if operating hours > 8760h (365 days)
      if (id(filter_operating_hours) > 8760.0f) return true;
      // Alarm if > 3 years (94608000s) since last filter change
      if (id(filter_last_change_ts) > 0) {
        auto now_ts = id(sntp_time).now().timestamp;
        if (now_ts > 0 && (now_ts - id(filter_last_change_ts)) > 94608000) return true;
      }
      return false;

sensor:
  - platform: template
    name: "Filter Betriebstage"
    id: filter_operating_days_sensor
    icon: "mdi:counter"
    unit_of_measurement: "Tage"
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: |-
      return id(filter_operating_hours) / 24.0f;
    update_interval: 300s

button:
  - platform: template
    name: "Filter gewechselt (Reset)"
    id: filter_reset_btn
    icon: "mdi:restart"
    entity_category: config
    on_press:
      - lambda: |-
          id(filter_operating_hours) = 0.0f;
          id(filter_last_change_ts) = id(sntp_time).now().timestamp;
          id(filter_change_alarm).publish_state(false);
          id(filter_operating_days_sensor).publish_state(0);
          ESP_LOGI("filter", "Filter counters reset. Timestamp: %d", id(filter_last_change_ts));
