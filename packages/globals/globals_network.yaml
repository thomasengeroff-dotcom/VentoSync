globals:
  # ---------------------------------------------------------
  # ESP-NOW PEER MANAGEMENT
  # ---------------------------------------------------------

  # Serialized list of discovered ESP-NOW peer MAC addresses.
  # Format: Comma-separated MAC strings, e.g. "AA:BB:CC:DD:EE:FF,11:22:33:44:55:66"
  # Persisted to flash so peers survive reboots without rediscovery.
  # Cleared when floor_id or room_id changes (topology invalidation).
  # Max 254 bytes covers ~10 peers (17 chars per MAC + separator).
  # See: invalidate_peer_cache_and_rediscover() in config_helpers.h
  - id: espnow_peers
    type: std::string
    max_restore_data_length: 254
    initial_value: '""'
    restore_value: true

  # ---------------------------------------------------------
  # PEER CHECK CONFIGURATION
  # ---------------------------------------------------------

  # Enables/disables the periodic peer connectivity check.
  # When enabled, the Master LED blinks if no ESP-NOW peers are
  # reachable within 5 minutes (visual alert for network issues).
  # Can be disabled via HA for standalone installations where
  # no peer devices exist (single-device rooms).
  # See: check_master_led_error() in led_feedback.h
  - id: peer_check_enabled
    type: bool
    initial_value: "true"
    restore_value: true

  # ---------------------------------------------------------
  # HEALTH MONITORING
  # ---------------------------------------------------------

  # Persistent counter of watchdog-triggered restarts.
  # Incremented by check_brain_health() in health_helpers.h
  # before each forced restart. Exposed as HA diagnostic sensor
  # for post-mortem analysis. Reset manually via HA service call.
  - id: watchdog_restarts_count
    type: int
    initial_value: '0'
    restore_value: yes
