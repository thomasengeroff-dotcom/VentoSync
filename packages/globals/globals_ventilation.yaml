# File:        globals_ventilation.yaml
# Description: Global variables for core ventilation state – fan control,
#              operating modes, intensity, and vacation mode memory.
#              These are the primary runtime state variables that define
#              what the ventilation system is currently doing.
# Author:      Thomas Engeroff
# Created:     2026-05-16
# Modified:    2026-05-16
# ==========================================================================

globals:
  # ---------------------------------------------------------
  # SYSTEM POWER STATE
  # ---------------------------------------------------------

  # Master power switch – when false, the entire ventilation system is off.
  # Controlled via HA or physical button long-press.
  - id: system_on
    type: bool
    initial_value: "true"

  # Ventilation enabled state (referenced by button logic).
  # Separate from system_on to allow "system on but fan paused" states.
  - id: ventilation_enabled
    type: bool
    initial_value: "true"

  # ---------------------------------------------------------
  # OPERATING MODE
  # ---------------------------------------------------------

  # Legacy operating mode (0=WRG, 1=Durchlüften, 2=Aus)
  # Kept for backward compatibility with older automation scripts.
  - id: operating_mode
    type: int
    initial_value: "0"
    restore_value: true

  # Current operating mode index (primary mode selector)
  # 0 = Smart-Automatik
  # 1 = WRG (Wärmerückgewinnung)
  # 2 = Durchlüften (Cross-ventilation)
  # 3 = Stoßlüftung (Boost)
  # 4 = Aus (Off)
  # Maps to MODE_NAMES[] array in globals.h
  - id: current_mode_index
    type: int
    initial_value: "0"
    restore_value: true

  # ---------------------------------------------------------
  # FAN INTENSITY
  # ---------------------------------------------------------

  # Fan intensity level (1–10, maps to PWM duty cycle via lookup table)
  # Level 2 is a quiet default suitable for nighttime operation.
  - id: fan_intensity_level
    type: int
    initial_value: "2"
    restore_value: true

  # ---------------------------------------------------------
  # VACATION MODE MEMORY
  # ---------------------------------------------------------
  # These globals snapshot the pre-vacation state so it can be
  # restored when vacation mode is deactivated.
  # See: vacation_helpers.h (activate/deactivate_vacation_mode)

  # Saved mode index before vacation mode was activated
  - id: pre_vacation_mode_index
    type: int
    initial_value: "0"
    restore_value: true

  # Saved fan intensity before vacation mode was activated
  - id: pre_vacation_intensity
    type: int
    initial_value: "2"
    restore_value: true
