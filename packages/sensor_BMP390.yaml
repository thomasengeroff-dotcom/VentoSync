# ==========================================================================
# WRG Wohnraumlüftung – BMP390 Temperature & Pressure Sensor
# https://github.com/thomasengeroff-dotcom/ESPHome-Wohnraumlueftung
#
# File:        sensor_BMP390.yaml
# Description: Configuration for BMP390 sensor and safety automation.
#              Includes multi-stage temperature monitoring for Traco PSU.
# ==========================================================================

sensor:
  # BMP390 Environmental Data (Temperature & Pressure)
  - platform: bmp3xx_i2c
    temperature:
      name: "BMP390 Temperatur"
      id: temperature
      accuracy_decimals: 1
      oversampling: 16x
      filters:
        - median:
            window_size: 5
            send_every: 5
      on_value_range:
        # Warning level: 50.0 °C to 59.9 °C
        - above: 50.0
          below: 59.9
          then:
            - logger.log:
                level: WARN
                format: "Achtung: Traco-Netzteil Derating-Grenze erreicht: %.1f °C"
                args: ["x"]
            - homeassistant.service:
                service: notify.notify
                data:
                  message: !lambda |-
                    char buf[128];
                    snprintf(buf, sizeof(buf), "%s: Achtung: Traco-Netzteil Derating-Grenze erreicht: %.1f°C", "${friendly_name}", x);
                    return (std::string)buf;
            - globals.set:
                id: thermal_warning_active
                value: 'true'
            - script.execute: update_leds
        # Critical level / Emergency shutdown: from 60.0 °C
        - above: 60.0
          then:
            - logger.log:
                level: ERROR
                format: "Kritische Temperatur! Not-Abschaltung! (%.1f °C)"
                args: ["x"]
            - homeassistant.service:
                service: notify.notify
                data:
                  message: !lambda |-
                    char buf[128];
                    snprintf(buf, sizeof(buf), "%s: KRITISCHE TEMPERATUR (%.1f°C)! Not-Abschaltung eingeleitet!", "${friendly_name}", x);
                    return (std::string)buf;
                  title: "WRG NOT-AUS (Überhitzung)"
            # MachtLED blinken macht keinen Sinn, da das Gerät sowieso abgeschaltet wird.
            #- globals.set:
            #    id: thermal_warning_active
            #    value: 'true'
            - output.set_level:
                id: fan_pwm_primary
                level: 0.5
            - deep_sleep.enter:
                id: safety_sleep
                sleep_duration: 60min
        # Recovery state: below 48.0 °C
        - below: 48.0
          then:
            - logger.log:
                level: INFO
                format: "Temperatur wieder im sicheren Bereich: %.1f °C"
                args: ["x"]
            - homeassistant.service:
                service: notify.notify
                data:
                  message: !lambda |-
                    char buf[128];
                    snprintf(buf, sizeof(buf), "%s: Entwarnung: Temperatur wieder im sicheren Bereich (%.1f°C)", "${friendly_name}", x);
                    return (std::string)buf;
            - globals.set:
                id: thermal_warning_active
                value: 'false'
            - script.execute: update_leds
    pressure:
      name: "BMP390 Luftdruck"
      id: pressure
      accuracy_decimals: 1
      oversampling: 16x
    address: 0x76
    update_interval: 60s
    iir_filter: 2x
