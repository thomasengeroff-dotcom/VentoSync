# ---------------------------------------------------------
# DEVICE CONFIGURATION
# Persistent configuration via Home Assistant
# ---------------------------------------------------------

substitutions:
  # Default values - can be changed via Home Assistant
  default_floor_id: "1"
  default_room_id: "1"
  default_device_id: "1"
  default_phase: "true" # true = Phase A, false = Phase B

# ---------------------------------------------------------
# CONFIGURATION INPUTS (Persistent)
# ---------------------------------------------------------

number:
  - platform: template
    name: "Stockwerk (Floor ID)"
    id: config_floor_id
    icon: "mdi:office-building"
    min_value: 0
    max_value: 9
    step: 1
    initial_value: ${default_floor_id}
    optimistic: true
    restore_value: true # Persist across reboots
    entity_category: config
    # mode: box (Removed to encourage integer display in HA)
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_floor_id((uint8_t)x);
            ESP_LOGI("config", "Floor ID updated to: %d", (uint8_t)x);

  - platform: template
    name: "Raum (Room ID)"
    id: config_room_id
    icon: "mdi:door"
    min_value: 0
    max_value: 10
    step: 1
    initial_value: ${default_room_id}
    optimistic: true
    restore_value: true # Persist across reboots
    entity_category: config
    # mode: box
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_room_id((uint8_t)x);
            ESP_LOGI("config", "Room ID updated to: %d", (uint8_t)x);

  - platform: template
    name: "Geräte-ID (Device ID)"
    id: config_device_id
    icon: "mdi:numeric"
    min_value: 1
    max_value: 25
    step: 1
    initial_value: ${default_device_id}
    optimistic: true
    restore_value: true # Persist across reboots
    entity_category: config
    # mode: box
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            v->set_device_id((uint8_t)x);
            ESP_LOGI("config", "Device ID updated to: %d", (uint8_t)x);

# ---------------------------------------------------------
# PHASE SELECTION
# ---------------------------------------------------------

select:
  - platform: template
    name: "Geräte-Phase (A/B)"
    id: config_phase
    icon: "mdi:swap-horizontal"
    options:
      - "Phase A (Startet mit Zuluft)"
      - "Phase B (Startet mit Abluft)"
    initial_option: "Phase A (Startet mit Zuluft)"
    optimistic: true
    restore_value: true # Persist across reboots
    set_action:
      then:
        - lambda: |-
            auto *v = (esphome::VentilationController*)id(ventilation_ctrl);
            bool is_phase_a = (x == "Phase A (Startet mit Zuluft)");
            v->set_is_phase_a(is_phase_a);
            ESP_LOGI("config", "Phase updated to: %s", is_phase_a ? "A" : "B");

# ---------------------------------------------------------
# DEVICE INFO SENSORS
# ---------------------------------------------------------

text_sensor:
  # Display this device's MAC address for easy peer configuration
  - platform: wifi_info
    mac_address:
      name: "Eigene MAC Adresse"
      id: own_mac_address
      internal: true
      icon: "mdi:identifier"
      entity_category: diagnostic

  # Configuration Summary
  - platform: template
    name: "Geräte-Konfiguration"
    id: device_config_summary
    icon: "mdi:information"
    entity_category: diagnostic
    lambda: |-
      char buffer[128];
      snprintf(buffer, sizeof(buffer), 
               "Floor: %d | Room: %d | Device: %d | Phase: %s",
               (int)id(config_floor_id).state,
               (int)id(config_room_id).state,
               (int)id(config_device_id).state,
               id(config_phase).current_option());
      return std::string(buffer);
    update_interval: 60s

  - platform: template
    name: "Dashboard Device ID"
    id: dashboard_device_id
    internal: true
    lambda: return std::to_string((int)id(config_device_id).state);
    update_interval: 60s

  - platform: template
    name: "Dashboard Floor ID"
    id: dashboard_floor_id
    internal: true
    lambda: return std::to_string((int)id(config_floor_id).state);
    update_interval: 60s

  - platform: template
    name: "Dashboard Room ID"
    id: dashboard_room_id
    internal: true
    lambda: return std::to_string((int)id(config_room_id).state);
    update_interval: 60s

  - platform: template
    name: "Dashboard Phase"
    id: dashboard_phase
    internal: true
    lambda: |-
      if (id(config_phase).current_option() == "Phase A (Startet mit Zuluft)") return std::string("A");
      return std::string("B");
    update_interval: 60s

# ---------------------------------------------------------
# CONFIGURATION BUTTONS
# ---------------------------------------------------------

button:
  # Reset to defaultswarn
  - platform: template
    name: "Auf Standardwerte zurücksetzen"
    icon: "mdi:restore"
    entity_category: config
    on_press:
      then:
        - number.set:
            id: config_floor_id
            value: ${default_floor_id}
        - number.set:
            id: config_room_id
            value: ${default_room_id}
        - number.set:
            id: config_device_id
            value: ${default_device_id}
        - select.set:
            id: config_phase
            option: "Phase A (Startet mit Zuluft)"
        - logger.log: "Konfiguration auf Standardwerte zurückgesetzt"

# ---------------------------------------------------------
# CONFIGURATION HELPERS
# ---------------------------------------------------------

# Expose configuration values as sensors for automation
sensor:
  - platform: template
    name: "Aktuelle Floor ID"
    id: current_floor_id
    icon: "mdi:office-building"
    entity_category: diagnostic
    lambda: |-
      return id(config_floor_id).state;
    update_interval: 60s

  - platform: template
    name: "Aktuelle Room ID"
    id: current_room_id
    icon: "mdi:door"
    entity_category: diagnostic
    lambda: |-
      return id(config_room_id).state;
    update_interval: 60s

  - platform: template
    name: "Aktuelle Device ID"
    id: current_device_id
    icon: "mdi:numeric"
    entity_category: diagnostic
    lambda: |-
      return id(config_device_id).state;
    update_interval: 60s
