# ---------------------------------------------------------
# OLED Display (SH1106 1.3" 128x64)
# ---------------------------------------------------------

font:
  - file: "gfonts://Roboto"
    id: font_tiny
    size: 10
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
  - file: "gfonts://Roboto"
    id: font_large
    size: 22

# Create a time component to trigger the page switching
time:
  - platform: sntp
    id: sntp_time

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled_display
    pages:
      # Page 1: System Info & Filter
      - id: page_system
        lambda: |-
          it.printf(0, 0, id(font_large), "System");
          it.printf(0, 26, id(font_small), "Modus: %s", id(luefter_modus).current_option().c_str());
          it.printf(0, 39, id(font_small), "Stufe: %d/10  (%.0f RPM)", id(fan_intensity_level), id(fan_rpm).state);

          if (id(filter_change_alarm).state) {
            it.printf(0, 52, id(font_small), "ALARM: Filter wechseln!");
          } else {
            it.printf(0, 52, id(font_small), "Filter: %.0f Tage aktiv", id(filter_operating_days_sensor).state);
          }

      # Page 2: Room Climate (SCD41 & BMP390)
      - id: page_raumklima
        lambda: |-
          it.printf(0, 0, id(font_large), "Klima");
          it.printf(0, 26, id(font_small), "Temp (BMP): %.1f°C", id(temperature).state);

          if (id(effective_co2).has_state()) {
            it.printf(0, 39, id(font_small), "CO2: %.0f ppm (%s)", id(effective_co2).state, id(effective_co2_bewertung).state.c_str());
            it.printf(0, 52, id(font_small), "rF (SCD41): %.1f %%", id(scd41_humidity).state);
          } else {
            it.printf(0, 39, id(font_small), "CO2: Initialisierung...");
          }

      # Page 3: BME680 Diagnostics (IAQ & Trend)
      - id: page_bme680
        lambda: |-
          it.printf(0, 0, id(font_large), "BME680 / IAQ");
          it.printf(0, 26, id(font_small), "eCO2: %.0f ppm  (%s)", id(iaq_co2eq).state, id(iaq_level).state.c_str());
          it.printf(0, 39, id(font_small), "Trend: %+.1f ppm/min %s", id(iaq_trend).state, id(iaq_trend_direction).state.c_str());
          it.printf(0, 52, id(font_small), "Status: %s", id(bme680_status).state.c_str());

      # Page 4: Heat Exchanger & WRG
      - id: page_wrg
        lambda: |-
          it.printf(0, 0, id(font_large), "Tauscher");
          it.printf(0, 26, id(font_small), "Zuluft: %.1f°C  (Rein)", id(temp_zuluft).state);
          it.printf(0, 39, id(font_small), "Abluft: %.1f°C  (Raus)", id(temp_abluft).state);
          it.printf(0, 52, id(font_small), "Effizienz: %.1f %%", id(heat_recovery_efficiency).state);

      # Page 5: Network & Info
      - id: page_network
        lambda: |-
          it.printf(0, 0, id(font_large), "Netzwerk");
          it.printf(0, 26, id(font_small), "IP: %s", id(sensor_ip_address).state.c_str());
          it.printf(0, 39, id(font_small), "WiFi: %.0f dBm", id(sensor_wifi_signal).state);
          it.printf(0, 52, id(font_small), "Laufzeit: %.1f d", id(sensor_uptime).state);

interval:
  - interval: 5s
    then:
      - display.page.show_next: oled_display
      - component.update: oled_display
