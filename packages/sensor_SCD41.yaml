# File:        sensor_SCD41.yaml
# Description: Configuration for SCD41 CO2 sensor.
#              Includes CO2, temperature, humidity, and calibration.
# Author:      Thomas Engeroff
# Created:     2026-03-05
# Modified:    2026-03-27
# ==========================================================================

sensor:
  # ---------------------------------------------------------
  # SCD41 CO2 SENSOR (Optional)
  # ---------------------------------------------------------
  # Will show as "unavailable" until sensor is connected to H2 header
  - platform: scd4x
    co2:
      name: "SCD41 CO2"
      id: scd41_co2
      accuracy_decimals: 0
      filters:
        - median:
            window_size: 5
            send_every: 3
    temperature_offset: 4.0 # Optional: default value is 4.0 °C
    ambient_pressure_compensation_source: pressure # take pressure from BMP390 sensor
    automatic_self_calibration: true
    temperature:
      name: "SCD41 Temperatur"
      id: scd41_temperature
      accuracy_decimals: 1
    humidity:
      name: "SCD41 Luftfeuchtigkeit"
      id: scd41_humidity
      accuracy_decimals: 1
